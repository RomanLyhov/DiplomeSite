<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitPlan — Редактирование тренировки</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">

</head>
<body>

    <div class="top-nav">
        <div class="navbar">
            <a href="/profil.html">Профиль</a>
            <a href="/exercises.html">Упражнения</a>
            <a href="/nutrition.html">Питание</a>
            <a href="/worckouts.html" class="active">Тренировки</a>
            <a href="/users.html" id="adminBtn" style="display:none;">Пользователи</a>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1 id="pageTitle">Редактирование тренировки</h1>
            <div style="display:flex; gap:12px;">
                <button class="btn-secondary" onclick="window.location.href='/worckouts.html'">← Назад</button>
                <button class="btn-danger" onclick="deleteWorkout()">🗑 Удалить</button>
            </div>
        </div>

        <!-- Основная информация -->
        <div class="card">
            <div class="card-title">Основная информация</div>
            <div class="form-group">
                <label>Название тренировки</label>
                <input id="workoutName" placeholder="Введите название">
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="isRecommended">
                <label for="isRecommended">⭐ Рекомендовать пользователям</label>
            </div>
        </div>

        <!-- Упражнения -->
        <div class="card">
            <div class="card-title">Упражнения</div>
            <div class="columns">
                <div>
                    <div class="section-title">Доступные упражнения</div>
                    <input class="search-input" id="searchExercises" placeholder="🔍 Поиск упражнений...">
                    <div class="list" id="allExercises">
                        <div class="loading">Загрузка...</div>
                    </div>
                </div>
                <div>
                    <div class="section-title">В тренировке</div>
                    <div class="list" id="selectedExercises">
                        <div class="loading">Добавьте упражнения</div>
                    </div>
                </div>
            </div>
        </div>

        <button class="btn-primary" onclick="saveWorkout()">💾 Сохранить изменения</button>
    </div>

    <div id="toast" class="toast">Готово!</div>

    <script>
        // ===== STATE =====
        let workoutId = null;
        let workoutName = '';
        let isRecommended = false;
        let selected = [];
        let allExercises = [];

        // ===== DOM REFS =====
        const workoutNameInput = document.getElementById('workoutName');
        const isRecommendedCheckbox = document.getElementById('isRecommended');
        const allExercisesContainer = document.getElementById('allExercises');
        const selectedExercisesContainer = document.getElementById('selectedExercises');
        const searchInput = document.getElementById('searchExercises');

        // ===== INIT =====
        async function init() {
            // Получаем ID из URL
            const params = new URLSearchParams(window.location.search);
            workoutId = params.get('id');

            if (!workoutId) {
                showToast('Не указан ID тренировки', 'error');
                return;
            }

            // Проверка пользователя
            const userId = localStorage.getItem('userId');
            if (!userId) {
                window.location.href = '/adminvh.html';
                return;
            }

            // Кнопка админа
            const role = (localStorage.getItem('role') || '').toLowerCase();
            if (role === 'admin') {
                document.getElementById('adminBtn').style.display = 'inline-block';
            }

            // Загружаем данные
            await loadWorkoutData();
            await loadExercises();
        }

        // ===== LOAD WORKOUT DATA =====
        async function loadWorkoutData() {
            try {
                const userId = localStorage.getItem('userId');
                const res = await fetch(`/workouts/${userId}`);
                const workouts = await res.json();

                const workout = workouts.find(w => w.id == workoutId || w.workoutid == workoutId);

                if (!workout) {
                    showToast('Тренировка не найдена', 'error');
                    return;
                }

                workoutName = workout.name || workout.workout_name || '';
                workoutNameInput.value = workoutName;
                document.getElementById('pageTitle').textContent = `✏️ ${workoutName}`;

                // Загружаем упражнения тренировки
                const exRes = await fetch(`/workout-exercises/${workoutId}`);
                const exercises = await exRes.json();

                selected = exercises.map(ex => ({
                    exerciseId: ex.exerciseId,
                    name: ex.name,
                    sets: ex.sets || 3,
                    reps: ex.reps || 10,
                    weight: ex.weight || 0,
                    rest: ex.rest || 60,
                    muscle_group: ex.muscle_group || ''
                }));

                renderSelected();

                // Проверяем статус recommended
                // Нужно отдельно получить инфо о тренировке
                const workoutInfoRes = await fetch(`/workouts/full/${userId}`);
                const allWorkouts = await workoutInfoRes.json();
                const fullWorkout = allWorkouts.find(w => w.id == workoutId);
                if (fullWorkout) {
                    isRecommended = fullWorkout.isRecommended || false;
                    isRecommendedCheckbox.checked = isRecommended;
                }

            } catch (err) {
                console.error('Error loading workout:', err);
                showToast('Ошибка загрузки данных', 'error');
            }
        }

        // ===== LOAD EXERCISES =====
        async function loadExercises() {
            try {
                const res = await fetch('/exercises');
                allExercises = await res.json();
                renderAllExercises();
            } catch (err) {
                console.error('Error loading exercises:', err);
                allExercisesContainer.innerHTML = '<div class="loading">❌ Ошибка загрузки</div>';
            }
        }

        // ===== RENDER ALL EXERCISES =====
        function renderAllExercises() {
            const searchTerm = searchInput.value.toLowerCase().trim();
            let filtered = allExercises;

            if (searchTerm) {
                filtered = allExercises.filter(ex =>
                    ex.name.toLowerCase().includes(searchTerm)
                );
            }

            // Исключаем уже добавленные
            const selectedIds = selected.map(e => e.exerciseId);
            filtered = filtered.filter(ex => !selectedIds.includes(ex.exerciseid));

            allExercisesContainer.innerHTML = '';

            if (filtered.length === 0) {
                allExercisesContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🔍</div>
                        <div>${searchTerm ? 'Ничего не найдено' : 'Нет доступных упражнений'}</div>
                    </div>
                `;
                return;
            }

            filtered.forEach(ex => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="item-header">
                        <div>
                            <b>${ex.name}</b>
                            <div class="badge">${ex.muscle_group || '—'}</div>
                        </div>
                        <button class="small-btn btn-add" data-id="${ex.exerciseid}">+ Добавить</button>
                    </div>
                `;
                div.querySelector('button').onclick = () => addExercise(ex);
                allExercisesContainer.appendChild(div);
            });
        }

        // ===== ADD EXERCISE =====
        function addExercise(ex) {
            if (selected.find(e => e.exerciseId === ex.exerciseid)) return;

            selected.push({
                exerciseId: ex.exerciseid,
                name: ex.name,
                muscle_group: ex.muscle_group || '',
                sets: 3,
                reps: 10,
                weight: 0,
                rest: 60
            });

            renderSelected();
            renderAllExercises();
            showToast(`➕ ${ex.name} добавлено`);
        }

        // ===== REMOVE EXERCISE =====
        function removeExercise(exerciseId) {
            const ex = selected.find(e => e.exerciseId === exerciseId);
            selected = selected.filter(e => e.exerciseId !== exerciseId);
            renderSelected();
            renderAllExercises();
            if (ex) showToast(`➖ ${ex.name} удалено`);
        }

        // ===== UPDATE FIELD =====
        function updateField(exerciseId, field, value) {
            const ex = selected.find(e => e.exerciseId === exerciseId);
            if (ex) {
                ex[field] = parseFloat(value) || 0;
            }
        }

        // ===== RENDER SELECTED =====
        function renderSelected() {
            selectedExercisesContainer.innerHTML = '';

            if (selected.length === 0) {
                selectedExercisesContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📋</div>
                        <div>Нет упражнений</div>
                        <div style="font-size:12px; margin-top:4px;">Добавьте из списка слева</div>
                    </div>
                `;
                return;
            }

            selected.forEach((ex, index) => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="item-header">
                        <div>
                            <b>${index + 1}. ${ex.name}</b>
                            <div class="badge">${ex.muscle_group || '—'}</div>
                        </div>
                        <button class="small-btn btn-remove">✕</button>
                    </div>
                    <div class="item-grid">
                        <div class="field">
                            <label>Подходы</label>
                            <input type="number" value="${ex.sets}" min="1" data-field="sets">
                        </div>
                        <div class="field">
                            <label>Повторения</label>
                            <input type="number" value="${ex.reps}" min="1" data-field="reps">
                        </div>
                        <div class="field">
                            <label>Вес (кг)</label>
                            <input type="number" value="${ex.weight}" min="0" step="0.5" data-field="weight">
                        </div>
                        <div class="field">
                            <label>Отдых (сек)</label>
                            <input type="number" value="${ex.rest}" min="0" data-field="rest">
                        </div>
                    </div>
                `;

                // Remove
                div.querySelector('.btn-remove').onclick = () => removeExercise(ex.exerciseId);

                // Inputs
                const inputs = div.querySelectorAll('.field input');
                inputs.forEach(input => {
                    const field = input.dataset.field;
                    input.oninput = () => updateField(ex.exerciseId, field, input.value);
                });

                selectedExercisesContainer.appendChild(div);
            });
        }

        // ===== SEARCH =====
        searchInput.oninput = renderAllExercises;

        // ===== SAVE WORKOUT =====
        async function saveWorkout() {
            const name = workoutNameInput.value.trim();
            if (!name) {
                showToast('Введите название тренировки', 'error');
                return;
            }

            if (selected.length === 0) {
                showToast('Добавьте хотя бы одно упражнение', 'error');
                return;
            }

            try {
                // 1. Обновляем название
                await fetch(`/workouts/${workoutId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });

                // 2. Обновляем статус recommended
                const recommended = isRecommendedCheckbox.checked;
                await fetch(`/workouts/${workoutId}/recommend`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ isRecommended: recommended })
                });

                // 3. Удаляем старые упражнения
                await fetch(`/workouts/${workoutId}/exercises`, {
                    method: 'DELETE'
                });

                // 4. Добавляем новые упражнения
                for (const ex of selected) {
                    // Проверяем существует ли упражнение в базе
                    let exerciseId = ex.exerciseId;

                    // Если exerciseId это число, проверяем существует ли оно
                    if (exerciseId) {
                        const checkRes = await fetch(`/exercises/${exerciseId}`);
                        if (!checkRes.ok) {
                            // Если не существует, создаём новое
                            const createRes = await fetch('/exercises', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    name: ex.name,
                                    muscle_group: ex.muscle_group || '-',
                                    difficulty: 'medium'
                                })
                            });
                            const data = await createRes.json();
                            if (data.success) {
                                // Нужно получить ID созданного упражнения
                                // Запрашиваем все упражнения и ищем по имени
                                const allExRes = await fetch('/exercises');
                                const allEx = await allExRes.json();
                                const found = allEx.find(e => e.name === ex.name);
                                if (found) exerciseId = found.exerciseid;
                            }
                        }
                    }

                    if (!exerciseId) {
                        console.error('Cannot find exercise ID for:', ex.name);
                        continue;
                    }

                    await fetch('/workout-exercises', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            workoutId: workoutId,
                            exerciseId: exerciseId,
                            sets: ex.sets,
                            reps: ex.reps,
                            weight: ex.weight,
                            rest: ex.rest
                        })
                    });
                }

                showToast('✅ Тренировка сохранена!');
                setTimeout(() => {
                    window.location.href = `/worckouts.html`;
                }, 1000);

            } catch (err) {
                console.error('Save error:', err);
                showToast('❌ Ошибка сохранения: ' + err.message, 'error');
            }
        }

        // ===== DELETE WORKOUT =====
        async function deleteWorkout() {
            if (!confirm(`Удалить тренировку "${workoutNameInput.value}"?`)) return;

            try {
                const res = await fetch(`/workouts/${workoutId}`, {
                    method: 'DELETE'
                });
                const data = await res.json();

                if (data.success) {
                    showToast('🗑 Тренировка удалена');
                    setTimeout(() => {
                        window.location.href = '/worckouts.html';
                    }, 500);
                } else {
                    showToast('❌ Ошибка удаления', 'error');
                }
            } catch (err) {
                console.error('Delete error:', err);
                showToast('❌ Ошибка удаления', 'error');
            }
        }

        // ===== TOAST =====
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast';
            if (type === 'error') toast.classList.add('error');
            toast.classList.add('show');

            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ===== START =====
        init();
    </script>
</body>
</html>
