<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan — Упражнение</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">

<style>
body{
  margin:0;
  font-family:Inter;
  color:#0F172A;

  /* 🔥 выраженный фон + тёмный контраст */
  background:
    linear-gradient(
      rgba(15, 23, 42, 0.65),
      rgba(15, 23, 42, 0.55)
    ),
    url("https://images.unsplash.com/photo-1517836357463-d25dfeac3438")
    center/cover no-repeat;

  min-height:100vh;
}

/* контейнер */
.container{
  max-width:900px;
  margin:60px auto;
  padding:0 20px;
}

/* 💎 стеклянная карточка */
.card{
  background:rgba(255,255,255,0.82);
  border:1px solid rgba(255,255,255,0.35);
  border-radius:22px;
  padding:28px;

  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);

  box-shadow:0 25px 60px rgba(0,0,0,0.25);
}

/* заголовок */
.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 6px;
}

.header-left h1{
  margin:0;
  font-size:26px;
  font-weight:700;
  color:#0F172A;
}

.header-left .hint{
  margin-top:6px;
  font-size:13px;
  color:#64748B;
}

/* кнопка назад */
.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: none;
  border-radius: 12px;
  background: rgba(79, 70, 229, 0.1);
  color: #4F46E5;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
  text-decoration: none;
  white-space: nowrap;
}

.btn-back:hover {
  background: rgba(79, 70, 229, 0.2);
  transform: translateY(-1px);
}

.btn-back:active {
  transform: scale(0.97);
}

/* сетка формы */
.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  margin-top:22px;
}

.form-group{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.full{
  grid-column:1 / -1;
}

/* label */
label{
  font-size:12px;
  font-weight:600;
  color:#475569;
}

/* inputs */
input, select, textarea{
  padding:12px 14px;
  border-radius:14px;

  border:1px solid rgba(148,163,184,0.35);
  background:rgba(255,255,255,0.6);

  color:#0F172A;
  outline:none;
  font-size:14px;

  transition:0.2s;
}

/* focus эффект */
input:focus,
select:focus,
textarea:focus{
  border-color:#4F46E5;
  background:rgba(255,255,255,0.95);
  box-shadow:0 0 0 4px rgba(79,70,229,0.15);
}

/* textarea */
textarea{
  min-height:110px;
  resize:none;
}

/* кнопка сохранения */
.btn{
  margin-top:18px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:600;
  cursor:pointer;
  color:white;

  background:linear-gradient(135deg,#4F46E5,#22C55E);

  transition:0.2s;
}

/* hover */
.btn:hover{
  transform:translateY(-1px);
  box-shadow:0 18px 35px rgba(79,70,229,0.25);
}

/* сообщение */
.message{
  margin-top:10px;
  font-size:14px;
  color:#64748B;
}

/* адаптив */
@media(max-width:700px){
  .form-grid{
    grid-template-columns:1fr;
  }
  .header {
    flex-direction: column;
    gap: 12px;
  }
  .btn-back {
    align-self: flex-start;
  }
}
</style>
</head>

<body>

<script>
const role = (localStorage.getItem("role") || "").toLowerCase();
if(role !== "admin"){
  location.href = "/exercises.html";
}
</script>

<div class="container">

  <div class="card">

    <div class="header">
      <div class="header-left">
        <h1>Упражнение</h1>
        <div class="hint">Создание / редактирование упражнения</div>
      </div>
      <button class="btn-back" onclick="window.location.href='/exercises.html'">
        ← Назад
      </button>
    </div>

    <form id="addExerciseForm">

      <div class="form-grid">

        <div class="form-group full">
          <label>Название</label>
          <input type="text" id="exerciseName" required>
        </div>

        <div class="form-group">
          <label>Группа мышц</label>
          <select id="muscleGroup">
            <option value="Грудные">Грудные</option>
            <option value="Спина">Спина</option>
            <option value="Ноги">Ноги</option>
            <option value="Плечи">Плечи</option>
            <option value="Руки">Руки</option>
            <option value="Пресс">Пресс</option>
            <option value="Кардио">Кардио</option>
          </select>
        </div>

        <div class="form-group">
          <label>Сложность</label>
          <select id="difficulty">
            <option value="easy">Лёгкая</option>
            <option value="med">Средняя</option>
            <option value="hard">Сложная</option>
          </select>
        </div>

        <div class="form-group full">
          <label>Инструкция</label>
          <textarea id="instruction"></textarea>
        </div>

        <div class="form-group full">
          <label>Видео (URL)</label>
          <input type="text" id="videoUrl" placeholder="https://...">
        </div>

      </div>

      <button class="btn">Сохранить</button>
      <div id="formMessage" class="message"></div>
  
    </form>

  </div>

</div>

<script>
const API = "";

async function loadEdit(){
  const id = new URLSearchParams(window.location.search).get("id");
  if(!id) return;

  const res = await fetch(`${API}/exercises/${id}`);
  const ex = await res.json();

  document.getElementById("exerciseName").value = ex.name || "";
  document.getElementById("muscleGroup").value = ex.muscle_group || "Спина";
  document.getElementById("difficulty").value = ex.difficulty || "med";
  document.getElementById("instruction").value = ex.instruction || "";
  document.getElementById("videoUrl").value = ex.video_url || "";

  document.getElementById("addExerciseForm").dataset.editId = id;
}

document.getElementById("addExerciseForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const form = e.target;
  const editId = form.dataset.editId;

  const payload = {
    name: document.getElementById("exerciseName").value,
    muscle_group: document.getElementById("muscleGroup").value,
    difficulty: document.getElementById("difficulty").value,
    instruction: document.getElementById("instruction").value,
    video_url: document.getElementById("videoUrl").value
  };

  const msg = document.getElementById("formMessage");

  try{

    const url = editId ? `/exercises/${editId}` : `/exercises`;
    const method = editId ? "PUT" : "POST";

    const response = await fetch(url,{
      method,
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(payload)
    });

    const data = await response.json();

    if(!response.ok) throw new Error(data.error || "Ошибка сервера");

    msg.innerText = "✅ Сохранено";
    msg.style.color = "#22c55e";

    setTimeout(()=> location.href="/exercises.html", 700);

  }catch(err){
    msg.innerText = "❌ Ошибка: " + err.message;
    msg.style.color = "#ef4444";
  }
});

loadEdit();
</script>

</body>
</html>
