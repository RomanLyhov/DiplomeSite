<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan — Добавление упражнения</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">

<style>
/* ===== ДОПОЛНИТЕЛЬНЫЕ СТИЛИ ДЛЯ ФОРМЫ ===== */
.card {
  max-width: 700px;
  margin: 0 auto;
}

.card h1 {
  margin-top: 0;
  margin-bottom: 24px;
  font-size: 24px;
  font-weight: 700;
  background: linear-gradient(135deg, #ffffff, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-weight: 600;
  font-size: 13px;
  margin-bottom: 4px;
  color: #94a3b8;
}

.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.08);
  background: #1b1f2a;
  color: #e2e8f0;
  font-size: 14px;
  outline: none;
  transition: 0.2s;
  box-sizing: border-box;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: #a78bfa;
  box-shadow: 0 0 0 3px rgba(168,85,247,0.12);
}

.form-group textarea {
  resize: vertical;
  min-height: 70px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

/* ===== КНОПКА НАЗАД ===== */
.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border-radius: 10px;
  text-decoration: none;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  color: #94a3b8;
  font-size: 13px;
  font-weight: 500;
  transition: 0.2s;
  margin-bottom: 16px;
}

.btn-back:hover {
  background: rgba(255,255,255,0.08);
  color: #e2e8f0;
}

/* ===== КНОПКА СОХРАНЕНИЯ ===== */
.btn-save {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  background: linear-gradient(135deg, #4F46E5, #22C55E);
  color: white;
  transition: 0.2s;
  margin-top: 8px;
}

.btn-save:hover {
  opacity: 0.85;
  transform: translateY(-1px);
}

.btn-save:active {
  transform: scale(0.98);
}

/* ===== ВИДЕО БЛОК (ПРОСТОЙ) ===== */
.video-section {
  margin-top: 4px;
  padding: 14px 16px;
  background: rgba(168,85,247,0.04);
  border: 1px dashed rgba(168,85,247,0.15);
  border-radius: 12px;
}

.video-section .label {
  font-weight: 600;
  font-size: 13px;
  color: #94a3b8;
  display: block;
  margin-bottom: 8px;
}

.video-row {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.video-btn {
  padding: 8px 18px;
  border-radius: 8px;
  border: none;
  background: rgba(168,85,247,0.12);
  color: #a78bfa;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  transition: 0.2s;
}

.video-btn:hover {
  background: rgba(168,85,247,0.2);
}

.video-file-name {
  font-size: 13px;
  color: #64748b;
}

.video-preview-box {
  margin-top: 10px;
  display: none;
}

.video-preview-box.active {
  display: block;
}

.video-preview-box video {
  max-width: 100%;
  max-height: 200px;
  border-radius: 10px;
  background: #000;
}

.video-remove {
  margin-top: 6px;
  padding: 4px 14px;
  border-radius: 6px;
  border: none;
  background: rgba(239,68,68,0.12);
  color: #ef4444;
  font-size: 12px;
  cursor: pointer;
}

.video-remove:hover {
  background: rgba(239,68,68,0.2);
}

@media (max-width: 600px) {
  .form-row {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<div class="top-nav">
  <div class="navbar">
    <a href="/profil.html">Профиль</a>
    <a href="/exercises.html" class="active">Упражнения</a>
    <a href="/nutrition.html">Питание</a>
    <a href="/workouts.html">Тренировки</a>
    <a href="/users.html" id="adminBtn" style="display:none;">Пользователи</a>
  </div>
</div>

<!-- ================= PAGE ================= -->
<div class="container">

  <div class="card">

    <a href="/exercises.html" class="btn-back">← Назад</a>

    <h1 id="pageTitle">Добавление упражнения</h1>

    <form id="exerciseForm" onsubmit="saveExercise(event)">

      <div class="form-row">
        <div class="form-group">
          <label for="exName">Название *</label>
          <input type="text" id="exName" placeholder="Жим лёжа" required>
        </div>
        <div class="form-group">
          <label for="exMuscle">Группа мышц</label>
          <input type="text" id="exMuscle" placeholder="Грудные">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="exDifficulty">Сложность</label>
          <select id="exDifficulty">
            <option value="">Без уровня</option>
            <option value="easy">Лёгкая</option>
            <option value="med">Средняя</option>
            <option value="hard">Сложная</option>
          </select>
        </div>
        <div class="form-group">
          <label for="exDescription">Описание</label>
          <textarea id="exDescription" placeholder="Техника выполнения..."></textarea>
        </div>
      </div>

      <!-- ===== ВИДЕО БЛОК ===== -->
      <div class="video-section">
        <span class="label">🎬 Видео-демонстрация</span>
        <div class="video-row">
          <button type="button" class="video-btn" onclick="document.getElementById('videoInput').click()">
            📁 Выбрать видео
          </button>
          <span class="video-file-name" id="videoFileName">Файл не выбран</span>
        </div>

        <input type="file" id="videoInput" accept="video/*" style="display:none;">

        <div class="video-preview-box" id="videoPreviewBox">
          <video id="videoPreview" controls>
            <source id="videoPreviewSource" src="">
          </video>
          <br>
          <button type="button" class="video-remove" onclick="removeVideo()">🗑 Удалить</button>
        </div>
      </div>

      <button type="submit" class="btn-save" id="submitBtn">Создать упражнение</button>
    </form>

  </div>

</div>

<!-- ================= SCRIPT ================= -->
<script>

const role = (localStorage.getItem("role") || "").toLowerCase();
const userId = localStorage.getItem("userId");

if (role === "admin") {
  document.getElementById("adminBtn").style.display = "inline-block";
}

if (!userId) {
  window.location.href = "/adminvh.html";
}

let editingId = null;
let videoData = null;

// ===== ID ИЗ URL =====
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if (id) {
  editingId = id;
  document.getElementById("pageTitle").textContent = "Редактирование упражнения";
  document.getElementById("submitBtn").textContent = "Сохранить изменения";
  loadExercise(id);
}

// ===== ЗАГРУЗКА ДЛЯ РЕДАКТИРОВАНИЯ =====
async function loadExercise(id) {
  try {
    const res = await fetch(`/exercises/${id}`);
    const ex = await res.json();

    document.getElementById("exName").value = ex.name || "";
    document.getElementById("exMuscle").value = ex.muscle_group || "";
    document.getElementById("exDifficulty").value = ex.difficulty || "";
    document.getElementById("exDescription").value = ex.description || "";

    const videoList = JSON.parse(localStorage.getItem("videoList") || "[]");
    const exerciseVideo = videoList.find(v => v.id === `video_${id}`);

    if (exerciseVideo) {
      const storedVideo = localStorage.getItem(exerciseVideo.id);
      if (storedVideo) {
        videoData = storedVideo;
        showVideoPreview(storedVideo);
        document.getElementById("videoFileName").textContent = exerciseVideo.name || "Видео загружено";
      }
    }

  } catch (err) {
    console.error("Ошибка загрузки:", err);
    alert("Не удалось загрузить упражнение");
  }
}

// ===== ВЫБОР ВИДЕО =====
document.getElementById("videoInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  if (!file.type.startsWith("video/")) {
    alert("Выберите видеофайл");
    this.value = "";
    return;
  }

  if (file.size > 100 * 1024 * 1024) {
    alert("Файл больше 100MB");
    this.value = "";
    return;
  }

  const reader = new FileReader();
  reader.onload = function(event) {
    videoData = event.target.result;
    showVideoPreview(videoData);
    document.getElementById("videoFileName").textContent = file.name;
  };
  reader.readAsDataURL(file);
});

// ===== ПОКАЗ ПРЕВЬЮ =====
function showVideoPreview(data) {
  const box = document.getElementById("videoPreviewBox");
  const video = document.getElementById("videoPreview");
  const source = document.getElementById("videoPreviewSource");

  source.src = data;
  video.load();
  box.classList.add("active");
}

// ===== УДАЛЕНИЕ ВИДЕО =====
function removeVideo() {
  videoData = null;
  document.getElementById("videoPreviewBox").classList.remove("active");
  document.getElementById("videoPreview").pause();
  document.getElementById("videoFileName").textContent = "Файл не выбран";
  document.getElementById("videoInput").value = "";
}

// ===== СОХРАНЕНИЕ =====
async function saveExercise(e) {
  e.preventDefault();

  const name = document.getElementById("exName").value.trim();
  if (!name) {
    alert("Введите название упражнения");
    return;
  }

  const payload = {
    name: name,
    muscle_group: document.getElementById("exMuscle").value.trim() || null,
    difficulty: document.getElementById("exDifficulty").value || null,
    description: document.getElementById("exDescription").value.trim() || null
  };

  try {
    let res;
    let exerciseId;

    if (editingId) {
      res = await fetch(`/exercises/${editingId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      exerciseId = editingId;
    } else {
      res = await fetch("/exercises", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      exerciseId = data.id;
    }

    // ===== СОХРАНЕНИЕ ВИДЕО =====
    if (videoData) {
      const videoList = JSON.parse(localStorage.getItem("videoList") || "[]");
      const oldVideo = videoList.find(v => v.id === `video_${exerciseId}`);
      if (oldVideo) {
        localStorage.removeItem(oldVideo.id);
        const filtered = videoList.filter(v => v.id !== `video_${exerciseId}`);
        localStorage.setItem("videoList", JSON.stringify(filtered));
      }

      const videoKey = `video_${exerciseId}`;
      localStorage.setItem(videoKey, videoData);

      const newVideoList = JSON.parse(localStorage.getItem("videoList") || "[]");
      newVideoList.push({
        id: videoKey,
        name: document.getElementById("videoFileName").textContent || "video.mp4",
        exerciseId: exerciseId,
        date: new Date().toISOString()
      });
      localStorage.setItem("videoList", JSON.stringify(newVideoList));
    }

    alert(editingId ? "Упражнение обновлено!" : "Упражнение создано!");
    window.location.href = "/exercises.html";

  } catch (err) {
    console.error("Ошибка:", err);
    alert("Ошибка при сохранении");
  }
}

</script>

</body>
</html>
