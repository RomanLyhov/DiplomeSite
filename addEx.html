<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan — Упражнение</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">

</head>

<body>

<script>
const role = (localStorage.getItem("role") || "").toLowerCase();
if(role !== "admin"){
  location.href = "/exercises.html";
}
</script>

<div class="container">

  <div class="card">

    <!-- ===== КНОПКА НАЗАД ===== -->
    <a href="/exercises.html" class="btn-back">← Назад</a>

    <h1>Упражнение</h1>
    <div class="hint">Создание / редактирование упражнения</div>

    <form id="addExerciseForm">

      <div class="form-grid">

        <div class="form-group full">
          <label>Название</label>
          <input type="text" id="exerciseName" required>
        </div>

        <div class="form-group">
          <label>Группа мышц</label>
          <select id="muscleGroup">
            <option value="Грудные">Грудные</option>
            <option value="Спина">Спина</option>
            <option value="Ноги">Ноги</option>
            <option value="Плечи">Плечи</option>
            <option value="Руки">Руки</option>
            <option value="Пресс">Пресс</option>
            <option value="Кардио">Кардио</option>
          </select>
        </div>

        <div class="form-group">
          <label>Сложность</label>
          <select id="difficulty">
            <option value="easy">Лёгкая</option>
            <option value="med">Средняя</option>
            <option value="hard">Сложная</option>
          </select>
        </div>

        <div class="form-group full">
          <label>Инструкция</label>
          <textarea id="instruction"></textarea>
        </div>

        <!-- ===== ВИДЕО БЛОК (ВМЕСТО URL) ===== -->
        <div class="form-group full">
          <label>Видео-демонстрация</label>
          <div class="video-upload-row">
            <button type="button" class="video-upload-btn" onclick="document.getElementById('videoInput').click()">
              📁 Выбрать видео
            </button>
            <span class="video-file-name" id="videoFileName">Файл не выбран</span>
          </div>

          <input type="file" id="videoInput" accept="video/*" style="display:none;">

          <div class="video-preview-box" id="videoPreviewBox">
            <video id="videoPreview" controls>
              <source id="videoPreviewSource" src="">
            </video>
            <br>
            <button type="button" class="video-remove-btn" onclick="removeVideo()">🗑 Удалить видео</button>
          </div>
        </div>

      </div>

      <button class="btn">Сохранить</button>
      <div id="formMessage" class="message"></div>
  
    </form>

  </div>

</div>

<script>
const API = "";

let editingId = null;
let videoData = null;

async function loadEdit(){
  const id = new URLSearchParams(window.location.search).get("id");
  if(!id) return;
  editingId = id;

  const res = await fetch(`${API}/exercises/${id}`);
  const ex = await res.json();

  document.getElementById("exerciseName").value = ex.name || "";
  document.getElementById("muscleGroup").value = ex.muscle_group || "Спина";
  document.getElementById("difficulty").value = ex.difficulty || "med";
  document.getElementById("instruction").value = ex.instruction || "";

  // Проверяем есть ли видео
  const videoList = JSON.parse(localStorage.getItem("videoList") || "[]");
  const exerciseVideo = videoList.find(v => v.id === `video_${id}`);

  if (exerciseVideo) {
    const storedVideo = localStorage.getItem(exerciseVideo.id);
    if (storedVideo) {
      videoData = storedVideo;
      showVideoPreview(storedVideo);
      document.getElementById("videoFileName").textContent = exerciseVideo.name || "Видео загружено";
    }
  }

  document.getElementById("addExerciseForm").dataset.editId = id;
}

// ===== ВЫБОР ВИДЕО =====
document.getElementById("videoInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  if (!file.type.startsWith("video/")) {
    alert("Пожалуйста, выберите видеофайл");
    this.value = "";
    return;
  }

  if (file.size > 100 * 1024 * 1024) {
    alert("Файл слишком большой. Максимальный размер 100MB");
    this.value = "";
    return;
  }

  const reader = new FileReader();
  reader.onload = function(event) {
    videoData = event.target.result;
    showVideoPreview(videoData);
    document.getElementById("videoFileName").textContent = file.name;
  };
  reader.readAsDataURL(file);
});

// ===== ПОКАЗ ПРЕВЬЮ =====
function showVideoPreview(data) {
  const box = document.getElementById("videoPreviewBox");
  const video = document.getElementById("videoPreview");
  const source = document.getElementById("videoPreviewSource");

  source.src = data;
  video.load();
  box.classList.add("active");
}

// ===== УДАЛЕНИЕ ВИДЕО =====
function removeVideo() {
  videoData = null;
  document.getElementById("videoPreviewBox").classList.remove("active");
  document.getElementById("videoPreview").pause();
  document.getElementById("videoFileName").textContent = "Файл не выбран";
  document.getElementById("videoInput").value = "";
}

// ===== СОХРАНЕНИЕ =====
document.getElementById("addExerciseForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const form = e.target;
  const editId = form.dataset.editId;

  const payload = {
    name: document.getElementById("exerciseName").value,
    muscle_group: document.getElementById("muscleGroup").value,
    difficulty: document.getElementById("difficulty").value,
    instruction: document.getElementById("instruction").value
  };

  const msg = document.getElementById("formMessage");

  try{

    const url = editId ? `/exercises/${editId}` : `/exercises`;
    const method = editId ? "PUT" : "POST";

    const response = await fetch(url,{
      method,
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(payload)
    });

    const data = await response.json();

    if(!response.ok) throw new Error(data.error || "Ошибка сервера");

    // ===== СОХРАНЯЕМ ВИДЕО =====
    const exerciseId = editId || data.id;

    if (videoData) {
      const videoList = JSON.parse(localStorage.getItem("videoList") || "[]");
      const oldVideo = videoList.find(v => v.id === `video_${exerciseId}`);
      if (oldVideo) {
        localStorage.removeItem(oldVideo.id);
        const filtered = videoList.filter(v => v.id !== `video_${exerciseId}`);
        localStorage.setItem("videoList", JSON.stringify(filtered));
      }

      const videoKey = `video_${exerciseId}`;
      localStorage.setItem(videoKey, videoData);

      const newVideoList = JSON.parse(localStorage.getItem("videoList") || "[]");
      newVideoList.push({
        id: videoKey,
        name: document.getElementById("videoFileName").textContent || "video.mp4",
        exerciseId: exerciseId,
        date: new Date().toISOString()
      });
      localStorage.setItem("videoList", JSON.stringify(newVideoList));
    }

    msg.innerText = "Сохранено";

    setTimeout(()=> location.href="/exercises.html", 700);

  }catch(err){
    msg.innerText = "Ошибка:" + err.message;
  }
});

loadEdit();
</script>

</body>
</html>
