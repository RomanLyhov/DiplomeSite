<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FitPlan — Упражнения</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">

<style>
/* Дополнительные стили для выравнивания */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 4px 20px 4px;
  flex-wrap: wrap;
  gap: 12px;
}

.header h1 {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, #ffffff, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin: 0;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.add-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: 44px;
  padding: 0 20px;
  border-radius: 16px;
  text-decoration: none;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  color: #e2e8f0;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.3px;
  backdrop-filter: blur(12px);
  transition: all .25s ease;
  box-shadow: 0 0 15px rgba(168,85,247,0.08), inset 0 0 12px rgba(255,255,255,0.02);
  white-space: nowrap;
  cursor: pointer;
}

.add-btn:hover {
  background: rgba(255,255,255,0.07);
  border-color: rgba(168,85,247,0.25);
  color: #fff;
  transform: translateY(-1px);
  box-shadow: 0 0 18px rgba(168,85,247,0.18), inset 0 0 12px rgba(255,255,255,0.03);
}

.add-btn:active {
  transform: scale(.98);
}

.add-btn::before {
  content: "+";
  font-size: 18px;
  font-weight: 500;
  color: #a78bfa;
}

/* Стили для видео в таблице */
.video-preview {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  background: rgba(168,85,247,0.12);
  border-radius: 8px;
  font-size: 12px;
  color: #a78bfa;
  cursor: pointer;
  transition: 0.2s;
  text-decoration: none;
}

.video-preview:hover {
  background: rgba(168,85,247,0.2);
}

.video-preview::before {
  content: "▶";
  font-size: 10px;
}

.video-modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  z-index: 9999;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(8px);
}

.video-modal.active {
  display: flex;
}

.video-modal-content {
  position: relative;
  max-width: 90%;
  max-height: 90%;
}

.video-modal-content video {
  max-width: 100%;
  max-height: 80vh;
  border-radius: 16px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
}

.video-modal-close {
  position: absolute;
  top: -40px;
  right: 0;
  background: none;
  border: none;
  color: white;
  font-size: 28px;
  cursor: pointer;
  transition: 0.2s;
  padding: 8px;
}

.video-modal-close:hover {
  transform: scale(1.2);
  color: #a78bfa;
}

@media (max-width: 600px) {
  .header {
    flex-direction: column;
    align-items: stretch;
  }
  .add-btn {
    justify-content: center;
    width: 100%;
  }
  .header-actions {
    width: 100%;
  }
}
</style>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<div class="top-nav">
  <div class="navbar">
      <a href="/profil.html">Профиль</a>
      <a href="/exercises.html" class="active">Упражнения</a>
      <a href="/nutrition.html">Питание</a>
      <a href="/workouts.html">Тренировки</a>

      <a href="/users.html"
         id="adminBtn"
         style="display:none;">Пользователи</a>
  </div>
</div>

<!-- ================= PAGE ================= -->
<div class="container">

  <div class="header">
    <h1>Упражнения</h1>

    <div class="header-actions">
      <!-- Скрытый input для выбора видео -->
      <input type="file" 
             id="videoFileInput" 
             accept="video/*" 
             style="display:none;">

      <button class="add-btn" id="addExerciseBtn" style="display:none;">
        Добавить упражнение
      </button>

      <button class="add-btn" id="addVideoBtn" style="display:none;">
        🎬 Добавить видео
      </button>
    </div>
  </div>

  <div class="card">

    <table>
      <thead>
        <tr>
          <th>Название</th>
          <th>Группа</th>
          <th>Сложность</th>
          <th>Видео</th>
          <th>Действия</th>
        </tr>
      </thead>

      <tbody id="exercises-table-body"></tbody>
    </table>

  </div>

</div>

<!-- ================= МОДАЛЬНОЕ ОКНО ДЛЯ ВИДЕО ================= -->
<div class="video-modal" id="videoModal">
  <div class="video-modal-content">
    <button class="video-modal-close" id="videoModalClose">✕</button>
    <video id="videoPlayer" controls>
      <source id="videoSource" src="">
    </video>
  </div>
</div>

<!-- ================= SCRIPT ================= -->
<script>

const role = (localStorage.getItem("role") || "").toLowerCase();
const userId = localStorage.getItem("userId");

// 🔥 защита от null (чтобы JS не падал)
const adminBtn = document.getElementById("adminBtn");
const addBtn = document.getElementById("addExerciseBtn");
const addVideoBtn = document.getElementById("addVideoBtn");
const videoFileInput = document.getElementById("videoFileInput");
const videoModal = document.getElementById("videoModal");
const videoPlayer = document.getElementById("videoPlayer");
const videoSource = document.getElementById("videoSource");
const videoModalClose = document.getElementById("videoModalClose");

if (role === "admin") {
  if (adminBtn) adminBtn.style.display = "inline-block";
  if (addBtn) addBtn.style.display = "inline-flex";
  if (addVideoBtn) addVideoBtn.style.display = "inline-flex";
}

// 🔥 проверка авторизации
if (!userId) {
  window.location.href = "/adminvh.html";
}

// ================= ОТКРЫТИЕ ПРОВОДНИКА ДЛЯ ВИДЕО =================
if (addVideoBtn) {
  addVideoBtn.addEventListener("click", () => {
    videoFileInput.click();
  });
}

// ================= ОБРАБОТКА ВЫБРАННОГО ВИДЕО =================
if (videoFileInput) {
  videoFileInput.addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    // Проверка что это видео
    if (!file.type.startsWith("video/")) {
      alert("Пожалуйста, выберите видеофайл");
      videoFileInput.value = "";
      return;
    }

    // Проверка размера (максимум 100MB)
    if (file.size > 100 * 1024 * 1024) {
      alert("Файл слишком большой. Максимальный размер 100MB");
      videoFileInput.value = "";
      return;
    }

    // Читаем файл как base64
    const reader = new FileReader();
    reader.onload = async (event) => {
      const videoData = event.target.result; // base64 строка

      // Отправляем на сервер или сохраняем в localStorage
      // ВАРИАНТ 1: Сохраняем в localStorage (только для демонстрации)
      // В реальном проекте отправляйте на сервер
      
      try {
        // Сохраняем в localStorage с ключом video_ + имя файла
        const videoKey = `video_${Date.now()}`;
        localStorage.setItem(videoKey, videoData);
        
        // Сохраняем информацию о видео в списке
        const videoList = JSON.parse(localStorage.getItem("videoList") || "[]");
        videoList.push({
          id: videoKey,
          name: file.name,
          size: file.size,
          date: new Date().toISOString()
        });
        localStorage.setItem("videoList", JSON.stringify(videoList));

        alert(`Видео "${file.name}" загружено!`);
        videoFileInput.value = "";
        
        // Перезагружаем таблицу
        loadExercises();

      } catch (err) {
        console.error("Ошибка сохранения видео:", err);
        alert("Ошибка при сохранении видео");
      }
    };

    reader.readAsDataURL(file);
  });
}

// ================= ОТКРЫТИЕ ВИДЕО В МОДАЛЬНОМ ОКНЕ =================
function openVideo(videoData) {
  videoSource.src = videoData;
  videoPlayer.load();
  videoModal.classList.add("active");
}

// ================= ЗАКРЫТИЕ МОДАЛЬНОГО ОКНА =================
if (videoModalClose) {
  videoModalClose.addEventListener("click", () => {
    videoModal.classList.remove("active");
    videoPlayer.pause();
  });
}

// Закрытие по клику на фон
if (videoModal) {
  videoModal.addEventListener("click", (e) => {
    if (e.target === videoModal) {
      videoModal.classList.remove("active");
      videoPlayer.pause();
    }
  });
}

// Закрытие по Escape
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && videoModal.classList.contains("active")) {
    videoModal.classList.remove("active");
    videoPlayer.pause();
  }
});

// ================= LOAD EXERCISES =================
async function loadExercises() {
  try {

    const res = await fetch("/exercises");
    const data = await res.json();

    console.log("EXERCISES:", data);

    const tbody = document.getElementById("exercises-table-body");

    if (!tbody) return;

    tbody.innerHTML = "";

    // Получаем список сохранённых видео
    const videoList = JSON.parse(localStorage.getItem("videoList") || "[]");

    data.forEach(ex => {

      const tr = document.createElement("tr");

      // Проверяем, есть ли видео для этого упражнения
      const exerciseVideo = videoList.find(v => v.id === `video_${ex.exerciseid}`) || 
                           videoList.find(v => v.name.includes(ex.name));

      let videoHtml = '<span style="opacity:0.4; font-size:12px;">Нет видео</span>';
      
      if (exerciseVideo) {
        const videoData = localStorage.getItem(exerciseVideo.id);
        if (videoData) {
          videoHtml = `<button class="video-preview" onclick="openVideo('${videoData}')">
                         Смотреть
                       </button>`;
        }
      }

      tr.innerHTML = `
        <td>${ex.name}</td>
        <td>${ex.muscle_group || "-"}</td>
        <td>
          <span class="badge ${ex.difficulty}">
            ${ex.difficulty || "—"}
          </span>
        </td>
        <td>${videoHtml}</td>
        <td>
          ${
            role === "admin"
              ? `
                <button class="btn edit">✎</button>
                <button class="btn delete">🗑</button>
              `
              : `<span style="opacity:0.6;">Только просмотр</span>`
          }
        </td>
      `;

      // ================= DELETE =================
      if (role === "admin") {

        const delBtn = tr.querySelector(".delete");

        if (delBtn) {
          delBtn.addEventListener("click", async (e) => {
            e.stopPropagation();

            if (!confirm("Удалить упражнение?")) return;

            // Удаляем видео, если есть
            const videoToDelete = videoList.find(v => v.id === `video_${ex.exerciseid}`);
            if (videoToDelete) {
              localStorage.removeItem(videoToDelete.id);
              const updatedList = videoList.filter(v => v.id !== videoToDelete.id);
              localStorage.setItem("videoList", JSON.stringify(updatedList));
            }

            await fetch(`/exercises/${ex.exerciseid}`, {
              method: "DELETE"
            });

            loadExercises();
          });
        }

        // ================= EDIT =================
        const editBtn = tr.querySelector(".edit");

        if (editBtn) {
          editBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            location.href = `addEx.html?id=${ex.exerciseid}`;
          });
        }
      }

      tbody.appendChild(tr);
    });

  } catch (err) {
    console.error("ERROR LOAD EXERCISES:", err);
  }
}

// старт
loadExercises();

</script>

</body>
</html>
