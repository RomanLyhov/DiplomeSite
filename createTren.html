<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FitPlan — Создание тренировки</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  color:#0F172A;

  background:
    linear-gradient(rgba(15,23,42,0.65), rgba(15,23,42,0.55)),
    url("https://images.unsplash.com/photo-1517836357463-d25dfeac3438")
    center/cover no-repeat;

  min-height:100vh;
}

/* container */
.container{
  max-width:1100px;
  margin:60px auto;
  padding:0 20px;
}

/* card */
.card{
  background:rgba(255,255,255,0.90);
  border:1px solid rgba(255,255,255,0.35);
  border-radius:22px;
  padding:32px;
  backdrop-filter: blur(18px);
  box-shadow:0 25px 60px rgba(0,0,0,0.25);
}

/* title */
.title{
  font-size:24px;
  font-weight:700;
}

.subtitle{
  font-size:13px;
  color:#64748B;
  margin-top:4px;
}

/* form grid */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
  margin-top:20px;
}

input, select{
  width:100%;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid rgba(148,163,184,0.35);
  background:rgba(255,255,255,0.7);
  outline:none;
  font-size:14px;
  transition:0.2s;
}

input:focus, select:focus{
  border-color:#4F46E5;
  box-shadow:0 0 0 4px rgba(79,70,229,0.15);
  background:white;
}

/* columns */
.columns{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
  margin-top:28px;
}

.section-title{
  font-size:14px;
  font-weight:600;
  margin-bottom:12px;
  color:#334155;
}

/* lists */
.list{
  background:rgba(255,255,255,0.6);
  border:1px solid #e5e7eb;
  border-radius:16px;
  padding:12px;
  max-height:420px;
  overflow:auto;
}

/* ================= EXERCISE CARD ================= */
.item{
  background:rgba(255,255,255,0.95);
  border:1px solid #E2E8F0;
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
  transition:0.2s;
}

.item:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 30px rgba(15,23,42,0.08);
}

/* header */
.item-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

/* name */
.item-header b{
  font-size:14px;
}

/* muscle badge */
.badge{
  display:inline-block;
  padding:4px 10px;
  font-size:11px;
  border-radius:999px;
  background:#EEF2FF;
  color:#4F46E5;
  margin-top:4px;
}

/* remove btn */
.small-btn{
  padding:6px 10px;
  font-size:12px;
  border-radius:10px;
  cursor:pointer;
  border:none;
  background:#EF4444;
  color:white;
  transition:0.2s;
}

.small-btn:hover{
  opacity:0.85;
}

/* inputs grid */
.item-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
}

/* input inside card */
.item-grid input{
  padding:8px 10px;
  font-size:12px;
  border-radius:10px;

  border:1px solid #E2E8F0;
  background:#F8FAFC;

  outline:none;
  transition:0.2s;
}

.item-grid input:focus{
  border-color:#4F46E5;
  background:white;
  box-shadow:0 0 0 3px rgba(79,70,229,0.12);
}

/* main button */
.btn{
  margin-top:20px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:600;
  cursor:pointer;
  color:white;
  background:linear-gradient(135deg,#4F46E5,#22C55E);
}

/* responsive */
@media(max-width:900px){
  .grid, .columns{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="card">

    <div class="title">Создание тренировки</div>
    <div class="subtitle">Собери свою программу тренировок</div>

    <!-- FORM -->
    <div class="grid">
      <div>
        <label>Название тренировки</label>
        <input id="workoutName" placeholder="например: День груди">
      </div>

      <div>
        <label>Сложность</label>
        <select id="difficulty">
          <option value="">Без уровня</option>
          <option value="easy">Лёгкая</option>
          <option value="med">Средняя</option>
          <option value="hard">Сложная</option>
        </select>
      </div>
    </div>

    <!-- LISTS -->
    <div class="columns">

      <div>
        <div class="section-title">Все упражнения</div>
        <div class="list" id="allExercises"></div>
      </div>

      <div>
        <div class="section-title">В тренировке</div>
        <div class="list" id="selectedExercises"></div>
      </div>

    </div>

    <button class="btn" onclick="createWorkout()">
      Создать тренировку
    </button>

  </div>

</div>

<script>
let selected = [];

/* load */
async function loadExercises(){
  const res = await fetch("/exercises");
  const data = await res.json();

  const container = document.getElementById("allExercises");
  container.innerHTML = "";

  data.forEach(ex => {

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div>
        <b>${ex.name}</b><br>
        <span class="badge">${ex.muscle_group}</span>
      </div>
      <button class="small-btn">+</button>
    `;

    div.querySelector("button").onclick = () => addExercise(ex);

    container.appendChild(div);
  });
}

/* add */
function addExercise(ex){

  if(selected.find(e => e.exerciseid === ex.exerciseid)) return;

  selected.push({
    exerciseid: ex.exerciseid,
    name: ex.name,
    muscle_group: ex.muscle_group,

    sets: 3,
    reps: 10,
    weight: 0,
    rest: 60,
    order: selected.length + 1
  });

  renderSelected();
}

/* remove */
function removeExercise(id){
  selected = selected.filter(e => e.exerciseid !== id);
  renderSelected();
}

/* update */
function updateField(id, field, value){
  const ex = selected.find(e => e.exerciseid === id);
  if(ex) ex[field] = value;
}

/* render */
function renderSelected(){

  const container = document.getElementById("selectedExercises");
  container.innerHTML = "";

  selected.forEach(ex => {

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div class="item-header">
        <div>
          <b>${ex.name}</b><br>
          <span class="badge">${ex.muscle_group}</span>
        </div>

        <button class="small-btn">x</button>
      </div>

      <div class="item-grid">
        <input type="number" value="${ex.sets}" placeholder="sets">
        <input type="number" value="${ex.reps}" placeholder="reps">
        <input type="number" value="${ex.weight}" placeholder="kg">
        <input type="number" value="${ex.rest}" placeholder="rest">
        <input type="number" value="${ex.order}" placeholder="order">
      </div>
    `;

    div.querySelector("button").onclick = () => removeExercise(ex.exerciseid);

    const inputs = div.querySelectorAll("input");

    inputs[0].oninput = e => updateField(ex.exerciseid, "sets", +e.target.value);
    inputs[1].oninput = e => updateField(ex.exerciseid, "reps", +e.target.value);
    inputs[2].oninput = e => updateField(ex.exerciseid, "weight", +e.target.value);
    inputs[3].oninput = e => updateField(ex.exerciseid, "rest", +e.target.value);
    inputs[4].oninput = e => updateField(ex.exerciseid, "order", +e.target.value);

    container.appendChild(div);
  });
}

/* create */
function createWorkout(){

  const payload = {
    name: document.getElementById("workoutName").value,
    difficulty: document.getElementById("difficulty").value,
    exercises: selected
  };

  console.log(payload);

  alert("Тренировка готова");
}

loadExercises();
</script>

</body>
</html>
