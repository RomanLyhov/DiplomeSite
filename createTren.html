<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan — Создание тренировки</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="container">
  <div class="card">

    <!-- ===== HEADER С КНОПКОЙ НАЗАД ===== -->
    <div class="header-row">
      <div class="header-left">
        <button class="back-btn" onclick="goBack()">
          ← Назад
        </button>
        <div>
          <div class="title">Создание тренировки</div>
          <div class="subtitle">Собери свою программу тренировок</div>
        </div>
      </div>
    </div>

    <!-- FORM -->
    <div class="grid">
      <div>
        <label>Название тренировки</label>
        <input id="workoutName" placeholder="например: День груди">
      </div>

      <div>
        <label>Сложность</label>
        <select id="difficulty">
          <option value="">Без уровня</option>
          <option value="easy">Лёгкая</option>
          <option value="med">Средняя</option>
          <option value="hard">Сложная</option>
        </select>
      </div>

      <!-- ===== ЧЕКБОКС ТОЛЬКО ДЛЯ АДМИНА ===== -->
      <div id="recommendWrapper" style="grid-column:1/-1; display:flex; align-items:center; gap:10px;" class="hidden">
        <input type="checkbox" id="isRecommended"
          style="width:18px; height:18px; cursor:pointer; accent-color:#4F46E5; flex-shrink:0;">
        <label for="isRecommended"
          style="font-size:14px; font-weight:500; color:#334155; cursor:pointer;">
          ⭐ Рекомендовать пользователям
        </label>
      </div>
    </div>

    <!-- LISTS -->
    <div class="columns">
      <div>
        <div class="section-title">Все упражнения</div>
        <div class="list" id="allExercises">
          <div class="loading">Загрузка упражнений...</div>
        </div>
      </div>
      <div>
        <div class="section-title">В тренировке</div>
        <div class="list" id="selectedExercises">
          <div class="loading" style="color:#94A3B8;">Добавьте упражнения слева</div>
        </div>
      </div>
    </div>

    <button class="btn" onclick="createWorkout()">
      Создать тренировку
    </button>

  </div>
</div>

<script>
const role = (localStorage.getItem("role") || "").toLowerCase();

// ===== ПОКАЗЫВАЕМ ЧЕКБОКС ТОЛЬКО АДМИНУ =====
if (role === "admin") {
  document.getElementById("recommendWrapper").classList.remove("hidden");
}

let selected = [];

/* ===== КНОПКА НАЗАД ===== */
function goBack() {
  window.location.href = "workouts.html";
}

/* ===== LOAD EXERCISES ===== */
async function loadExercises() {
  const container = document.getElementById("allExercises");
  try {
    const res = await fetch("/exercises");

    if (!res.ok) {
      container.innerHTML = '<div class="loading" style="color:red;">Ошибка загрузки</div>';
      return;
    }

    const data = await res.json();
    container.innerHTML = "";

    if (data.length === 0) {
      container.innerHTML = '<div class="loading">Нет упражнений в базе</div>';
      return;
    }

    data.forEach(ex => {
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `
        <div>
          <b>${ex.name}</b><br>
          <span class="badge">${ex.muscle_group || '—'}</span>
        </div>
        <button class="small-btn">+</button>
      `;
      div.querySelector("button").onclick = () => addExercise(ex);
      container.appendChild(div);
    });

  } catch (err) {
    container.innerHTML = '<div class="loading" style="color:red;">Ошибка соединения</div>';
    console.error("loadExercises error:", err);
  }
}

/* ===== ADD EXERCISE ===== */
function addExercise(ex) {
  if (selected.find(e => e.exerciseid === ex.exerciseid)) return;
  selected.push({
    exerciseid: ex.exerciseid,
    name: ex.name,
    muscle_group: ex.muscle_group,
    sets: 3,
    reps: 10,
    weight: 0,
    rest: 60,
    order: selected.length + 1
  });
  renderSelected();
}

/* ===== REMOVE ===== */
function removeExercise(id) {
  selected = selected.filter(e => e.exerciseid !== id);
  renderSelected();
}

/* ===== UPDATE FIELD ===== */
function updateField(id, field, value) {
  const ex = selected.find(e => e.exerciseid === id);
  if (ex) ex[field] = value;
}

/* ===== RENDER SELECTED ===== */
function renderSelected() {
  const container = document.getElementById("selectedExercises");
  container.innerHTML = "";

  if (selected.length === 0) {
    container.innerHTML = '<div class="loading" style="color:#94A3B8;">Добавьте упражнения слева</div>';
    return;
  }

  selected.forEach(ex => {
    const div = document.createElement("div");
    div.className = "item";
    div.style.flexDirection = "column";
    div.style.alignItems = "stretch";

    div.innerHTML = `
      <div class="item-header">
        <div>
          <b>${ex.name}</b><br>
          <span class="badge">${ex.muscle_group || '—'}</span>
        </div>
        <button class="small-btn">✕</button>
      </div>
      <div class="item-grid">
        <div class="field">
          <label>Подходы</label>
          <input type="number" value="${ex.sets}" min="1">
        </div>
        <div class="field">
          <label>Повторения</label>
          <input type="number" value="${ex.reps}" min="1">
        </div>
        <div class="field">
          <label>Вес (кг)</label>
          <input type="number" value="${ex.weight}" min="0">
        </div>
        <div class="field">
          <label>Отдых (сек)</label>
          <input type="number" value="${ex.rest}" min="0">
        </div>
        <div class="field">
          <label>Порядок</label>
          <input type="number" value="${ex.order}" min="1">
        </div>
      </div>
    `;

    div.querySelector("button").onclick = () => removeExercise(ex.exerciseid);

    const inputs = div.querySelectorAll("input");
    inputs[0].oninput = e => updateField(ex.exerciseid, "sets",   +e.target.value);
    inputs[1].oninput = e => updateField(ex.exerciseid, "reps",   +e.target.value);
    inputs[2].oninput = e => updateField(ex.exerciseid, "weight", +e.target.value);
    inputs[3].oninput = e => updateField(ex.exerciseid, "rest",   +e.target.value);
    inputs[4].oninput = e => updateField(ex.exerciseid, "order",  +e.target.value);

    container.appendChild(div);
  });
}

/* ===== CREATE WORKOUT ===== */
async function createWorkout() {
  const userId = localStorage.getItem("userId");

  if (!userId) {
    alert("Ошибка: не найден пользователь. Войдите заново.");
    return;
  }

  const name = document.getElementById("workoutName").value.trim();
  if (!name) {
    alert("Введите название тренировки");
    return;
  }

  if (selected.length === 0) {
    alert("Добавьте хотя бы одно упражнение");
    return;
  }

  // Если пользователь не админ — isRecommended всегда false
  const isRecommended = (role === "admin") 
    ? document.getElementById("isRecommended").checked 
    : false;

  const payload = {
    userId: Number(userId),
    name: name,
    difficulty: document.getElementById("difficulty").value,
    isRecommended: isRecommended,
    exercises: selected
  };

  try {
    const res = await fetch("/workouts", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (data.success) {
      const workoutId = data.id;

      for (const ex of selected) {
        await fetch("/exercises", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            workoutId: workoutId,
            exerciseId: ex.exerciseid,
            name: ex.name,
            sets: ex.sets,
            reps: ex.reps,
            weight: ex.weight,
            rest: ex.rest
          })
        });
      }

      alert("Тренировка создана!");
      document.getElementById("workoutName").value = "";
      document.getElementById("isRecommended").checked = false;
      document.getElementById("difficulty").value = "";
      selected = [];
      renderSelected();

    } else {
      alert("Ошибка: " + (data.error || "неизвестная ошибка"));
    }

  } catch (err) {
    console.error("createWorkout error:", err);
    alert("Ошибка соединения с сервером");
  }
}

/* ===== INIT ===== */
loadExercises();
</script>

</body>
</html>
