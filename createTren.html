<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FitPlan — Создание тренировки</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  color:#0F172A;

  background:
    linear-gradient(rgba(15,23,42,0.65), rgba(15,23,42,0.55)),
    url("https://images.unsplash.com/photo-1517836357463-d25dfeac3438")
    center/cover no-repeat;

  min-height:100vh;
}

/* container */
.container{
  max-width:1100px;
  margin:60px auto;
  padding:0 20px;
}

/* card */
.card{
  background:rgba(255,255,255,0.90);
  border:1px solid rgba(255,255,255,0.35);
  border-radius:22px;
  padding:32px;
  backdrop-filter: blur(18px);
  box-shadow:0 25px 60px rgba(0,0,0,0.25);
}

/* title */
.title{
  font-size:24px;
  font-weight:700;
}

.subtitle{
  font-size:13px;
  color:#64748B;
  margin-top:4px;
}

/* form */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
  margin-top:20px;
}

input, select{
  width:100%;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid rgba(148,163,184,0.35);
  background:rgba(255,255,255,0.7);
  outline:none;
  font-size:14px;
  transition:0.2s;
}

input:focus, select:focus{
  border-color:#4F46E5;
  box-shadow:0 0 0 4px rgba(79,70,229,0.15);
  background:white;
}

/* columns */
.columns{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
  margin-top:28px;
}

.section-title{
  font-size:14px;
  font-weight:600;
  margin-bottom:12px;
  color:#334155;
}

/* list */
.list{
  background:rgba(255,255,255,0.6);
  border:1px solid #e5e7eb;
  border-radius:16px;
  padding:12px;
  max-height:420px;
  overflow:auto;
}

/* ================= CARD ================= */
.item{
  background:rgba(255,255,255,0.97);
  border:1px solid #E2E8F0;
  border-radius:18px;
  padding:16px;
  margin-bottom:14px;
  transition:0.2s;
}

.item:hover{
  transform:translateY(-2px);
  box-shadow:0 14px 35px rgba(15,23,42,0.10);
}

/* header */
.item-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:12px;
}

.item-header b{
  font-size:15px;
  font-weight:700;
}

/* badge */
.badge{
  display:inline-block;
  margin-top:4px;
  padding:4px 10px;
  font-size:11px;
  border-radius:999px;
  background:#EEF2FF;
  color:#4F46E5;
}

/* delete */
.small-btn{
  padding:6px 10px;
  font-size:12px;
  border-radius:10px;
  cursor:pointer;
  border:none;
  background:#EF4444;
  color:white;
}

/* grid inside card */
.item-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}

/* field */
.field{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.field label{
  font-size:10px;
  font-weight:600;
  color:#64748B;
  text-transform:uppercase;
  letter-spacing:0.5px;
}

.field input{
  padding:8px 10px;
  font-size:13px;
  border-radius:10px;
  border:1px solid #E2E8F0;
  background:#F8FAFC;
  text-align:center;
}

.field input:focus{
  border-color:#4F46E5;
  background:white;
  box-shadow:0 0 0 3px rgba(79,70,229,0.12);
}

/* button */
.btn{
  margin-top:20px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:600;
  cursor:pointer;
  color:white;
  background:linear-gradient(135deg,#4F46E5,#22C55E);
}

/* responsive */
@media(max-width:900px){
  .grid, .columns{
    grid-template-columns:1fr;
  }

  .item-grid{
    grid-template-columns:1fr 1fr;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="card">

    <div class="title">Создание тренировки</div>
    <div class="subtitle">Собери свою программу тренировок</div>

    <!-- FORM -->
    <div class="grid">
      <div>
        <label>Название тренировки</label>
        <input id="workoutName" placeholder="например: День груди">
      </div>
      <div style="display:flex; align-items:center; gap:10px; margin-top:8px;">
  <input type="checkbox" id="isRecommended" style="width:18px; height:18px; cursor:pointer; accent-color:#4F46E5;">
  <label for="isRecommended" style="font-size:14px; font-weight:500; color:#334155; cursor:pointer;">
    ⭐ Рекомендовать пользователям
  </label>
</div>

      <div>
        <label>Сложность</label>
        <select id="difficulty">
          <option value="">Без уровня</option>
          <option value="easy">Лёгкая</option>
          <option value="med">Средняя</option>
          <option value="hard">Сложная</option>
        </select>
      </div>
    </div>

    <!-- LISTS -->
    <div class="columns">

      <div>
        <div class="section-title">Все упражнения</div>
        <div class="list" id="allExercises"></div>
      </div>

      <div>
        <div class="section-title">В тренировке</div>
        <div class="list" id="selectedExercises"></div>
      </div>

    </div>

    <button class="btn" onclick="createWorkout()">
      Создать тренировку
    </button>

  </div>

</div>

<script>
let selected = [];

/* load exercises */
async function loadExercises(){
  const res = await fetch("/exercises");
  const data = await res.json();

  const container = document.getElementById("allExercises");
  container.innerHTML = "";

  data.forEach(ex => {

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div>
        <b>${ex.name}</b><br>
        <span class="badge">${ex.muscle_group}</span>
      </div>
      <button class="small-btn">+</button>
    `;

    div.querySelector("button").onclick = () => addExercise(ex);

    container.appendChild(div);
  });
}

/* add exercise */
function addExercise(ex){

  if(selected.find(e => e.exerciseid === ex.exerciseid)) return;

  selected.push({
    exerciseid: ex.exerciseid,
    name: ex.name,
    muscle_group: ex.muscle_group,
    sets: 3,
    reps: 10,
    weight: 0,
    rest: 60,
    order: selected.length + 1
  });

  renderSelected();
}

/* remove */
function removeExercise(id){
  selected = selected.filter(e => e.exerciseid !== id);
  renderSelected();
}

/* update */
function updateField(id, field, value){
  const ex = selected.find(e => e.exerciseid === id);
  if(ex) ex[field] = value;
}

/* render */
function renderSelected(){

  const container = document.getElementById("selectedExercises");
  container.innerHTML = "";

  selected.forEach(ex => {

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div class="item-header">
        <div>
          <b>${ex.name}</b><br>
          <span class="badge">${ex.muscle_group}</span>
        </div>

        <button class="small-btn">x</button>
      </div>

      <div class="item-grid">

        <div class="field">
          <label>Подходы</label>
          <input type="number" value="${ex.sets}">
        </div>

        <div class="field">
          <label>Повторения</label>
          <input type="number" value="${ex.reps}">
        </div>

        <div class="field">
          <label>Вес (кг)</label>
          <input type="number" value="${ex.weight}">
        </div>

        <div class="field">
          <label>Отдых (сек)</label>
          <input type="number" value="${ex.rest}">
        </div>

        <div class="field">
          <label>Порядок</label>
          <input type="number" value="${ex.order}">
        </div>

      </div>
    `;

    div.querySelector("button").onclick = () => removeExercise(ex.exerciseid);

    const inputs = div.querySelectorAll("input");

    inputs[0].oninput = e => updateField(ex.exerciseid, "sets", +e.target.value);
    inputs[1].oninput = e => updateField(ex.exerciseid, "reps", +e.target.value);
    inputs[2].oninput = e => updateField(ex.exerciseid, "weight", +e.target.value);
    inputs[3].oninput = e => updateField(ex.exerciseid, "rest", +e.target.value);
    inputs[4].oninput = e => updateField(ex.exerciseid, "order", +e.target.value);

    container.appendChild(div);
  });
}

/* create workout */
async function createWorkout() {
    // получаем userId из хранилища
    const user = JSON.parse(localStorage.getItem("user") || sessionStorage.getItem("user") || "{}");
    const userId = user.id || user.userId;

    if (!userId) {
        alert("Ошибка: не найден пользователь. Войдите заново.");
        return;
    }

    const name = document.getElementById("workoutName").value.trim();
    if (!name) {
        alert("Введите название тренировки");
        return;
    }

    if (selected.length === 0) {
        alert("Добавьте хотя бы одно упражнение");
        return;
    }

    const payload = {
        userId: userId,
        name: name,
        difficulty: document.getElementById("difficulty").value,
        isRecommended: document.getElementById("isRecommended").checked,
        exercises: selected
    };

    console.log("📤 Отправляем:", payload);

    try {
        const res = await fetch("/workouts", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const data = await res.json();
        console.log("📥 Ответ сервера:", data);

        if (data.success) {
            const workoutId = data.id;

            // сохраняем упражнения
            for (const ex of selected) {
                await fetch("/exercises", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        workoutId: workoutId,
                        exerciseId: ex.exerciseid,
                        name: ex.name,
                        sets: ex.sets,
                        reps: ex.reps,
                        weight: ex.weight,
                        rest: ex.rest
                    })
                });
            }

            alert("✅ Тренировка создана!");
            document.getElementById("workoutName").value = "";
            document.getElementById("isRecommended").checked = false;
            selected = [];
            renderSelected();
        } else {
            alert("Ошибка: " + (data.error || "неизвестная ошибка"));
        }
    } catch (err) {
        console.error("❌ Ошибка:", err);
        alert("Ошибка соединения с сервером");
    }
}
</script>

</body>
</html>
