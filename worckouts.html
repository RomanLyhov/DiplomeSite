<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FitPlan — Тренировки</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">

</head>
<body>

<div class="navbar">

  <div class="logo">FitPlan</div>

  <div style="display:flex; gap:10px;">
    <a href="/exercises.html">Упражнения</a>
    <a href="/nutrition.html">Питание</a>
  </div>

</div>

<div class="container">

  <div class="header">

    <h1>💪 Мои тренировки</h1>

    <button class="add-btn" id="createWorkoutBtn">
      + Создать
    </button>

  </div>

  <div class="card">

    <div id="workoutsList"></div>

  </div>

</div>

<script>

const userId = localStorage.getItem("userId");

if (!userId) {
  location.href = "/adminvh.html";
}

async function loadWorkouts() {

  const res = await fetch(`/workouts/${userId}`);

  const workouts = await res.json();

  const container = document.getElementById("workoutsList");

  container.innerHTML = "";

  if (workouts.length === 0) {

    container.innerHTML = `
      <div class="empty">
        У вас пока нет тренировок
      </div>
    `;

    return;
  }

  workouts.forEach(w => {

    const div = document.createElement("div");

    div.className = "workout-item";

    div.innerHTML = `
      <div class="workout-title">
        ${w.name}
      </div>

      <button class="btn">
        Открыть
      </button>
    `;

    div.querySelector(".btn").onclick = () => {
      location.href = `/workout.html?id=${w.workoutid}`;
    };

    container.appendChild(div);

  });

}

document.getElementById("createWorkoutBtn")
.addEventListener("click", async () => {

  const name = prompt("Название тренировки");

  if (!name) return;

  const res = await fetch("/workouts", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      userId,
      name
    })
  });

  const data = await res.json();

  if (data.success) {
    loadWorkouts();
  }

});

loadWorkouts();

</script>

</body>
</html>
