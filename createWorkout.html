<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan — Создание тренировки</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="top-nav">
  <div class="navbar">
      <a href="/profil.html">Профиль</a>
      <a href="/exercises.html">Упражнения</a>
      <a href="/nutrition.html">Питание</a>
      <a href="/workouts.html">Тренировки</a>
  </div>
</div>

<div class="container">

  <div class="card">
    <h2>➕ Создать тренировку</h2>

    <input id="workoutName" placeholder="Название тренировки"
           style="width:100%; padding:10px; margin-top:10px; border-radius:10px; border:none;">

    <button class="btn" id="createBtn" style="margin-top:15px;">
      Создать
    </button>

  </div>

</div>

<script>

const userId = localStorage.getItem("userId");

if (!userId) {
  location.href = "/adminvh.html";
}

document.getElementById("createBtn").addEventListener("click", async () => {

  const name = document.getElementById("workoutName").value.trim();

  if (!name) return alert("Введите название");

  const res = await fetch("/workouts", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ userId, name })
  });

  const data = await res.json();

  if (data.success) {
    location.href = "/workouts.html";
  } else {
    alert("Ошибка создания");
  }

});

</script>

</body>
</html>
