<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FitPlan — Тренировки</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="top-nav">
  <div class="navbar">
      <a href="/profil.html">Профиль</a>
      <a href="/exercises.html">Упражнения</a>
      <a href="/nutrition.html">Питание</a>
      <a href="/workouts.html" class="active">Тренировки</a>
      <a href="/users.html"
        id="adminBtn"
        style="display:none;">Пользователи</a>
  </div>
</div>

<div class="container">

  <div class="header">
    <h1>💪 Мои тренировки</h1>

    <a class="add-btn" href="/createWorkout.html">
  + Создать тренировку
</a>
  </div>

  <div class="card">
    <div id="workoutsList"></div>
  </div>

</div>

<script>

const userId = localStorage.getItem("userId");
const role = (localStorage.getItem("role") || "").toLowerCase();

if (!userId) {
  location.href = "/adminvh.html";
}

/* ADMIN BUTTON */
if (role === "admin") {
  const adminBtn = document.getElementById("adminBtn");
  if (adminBtn) adminBtn.style.display = "inline-block";
}

/* LOAD WORKOUTS */
async function loadWorkouts() {

  const res = await fetch(`/workouts/${userId}`);
  const workouts = await res.json();

  const container = document.getElementById("workoutsList");
  container.innerHTML = "";

  if (!workouts.length) {
    container.innerHTML = `
      <div class="card">
        <p style="opacity:0.7;">У вас пока нет тренировок</p>
      </div>
    `;
    return;
  }

  workouts.forEach(w => {

    const div = document.createElement("div");

    div.className = "card";
    div.style.display = "flex";
    div.style.justifyContent = "space-between";
    div.style.alignItems = "center";
    div.style.marginBottom = "10px";

    div.innerHTML = `
      <div>
        <div style="font-weight:700; font-size:18px;">
          🏋️ ${w.name}
        </div>
        <div style="font-size:12px; opacity:0.6;">
          ID: ${w.workoutid}
        </div>
      </div>

      <button class="btn">
        Открыть
      </button>
    `;

    div.querySelector("button").onclick = () => {
      location.href = `/workout.html?id=${w.workoutid}`;
    };

    container.appendChild(div);
  });
}

loadWorkouts();

</script>

</body>
</html>
