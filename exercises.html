<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FitPlan — Упражнения</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">

<style>
/* Дополнительные стили для выравнивания */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 4px 20px 4px;
}

.header h1 {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, #ffffff, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin: 0;
}

.add-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: 44px;
  padding: 0 20px;
  border-radius: 16px;
  text-decoration: none;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  color: #e2e8f0;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.3px;
  backdrop-filter: blur(12px);
  transition: all .25s ease;
  box-shadow: 0 0 15px rgba(168,85,247,0.08), inset 0 0 12px rgba(255,255,255,0.02);
  white-space: nowrap;
}

.add-btn:hover {
  background: rgba(255,255,255,0.07);
  border-color: rgba(168,85,247,0.25);
  color: #fff;
  transform: translateY(-1px);
  box-shadow: 0 0 18px rgba(168,85,247,0.18), inset 0 0 12px rgba(255,255,255,0.03);
}

.add-btn:active {
  transform: scale(.98);
}

.add-btn::before {
  content: "+";
  font-size: 18px;
  font-weight: 500;
  color: #a78bfa;
}

@media (max-width: 600px) {
  .header {
    flex-direction: column;
    align-items: stretch;
    gap: 12px;
  }
  .add-btn {
    justify-content: center;
    width: 100%;
  }
}
</style>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<div class="top-nav">
  <div class="navbar">
      <a href="/profil.html">Профиль</a>
      <a href="/exercises.html" class="active">Упражнения</a>
      <a href="/nutrition.html">Питание</a>
      <a href="/workouts.html">Тренировки</a>

      <a href="/users.html"
         id="adminBtn"
         style="display:none;">Пользователи</a>
  </div>
</div>

<!-- ================= PAGE ================= -->
<div class="container">

  <div class="header">
    <h1>Упражнения</h1>

    <a class="add-btn"
   href="addEx.html"
   id="addExerciseBtn"
   style="display:none;">
   Добавить упражнение
</a>
  </div>
  <div class="card">

    <table>
      <thead>
        <tr>
          <th>Название</th>
          <th>Группа</th>
          <th>Сложность</th>
          <th>Действия</th>
        </tr>
      </thead>

      <tbody id="exercises-table-body"></tbody>
    </table>

  </div>

</div>

<!-- ================= SCRIPT ================= -->
<script>

const role = (localStorage.getItem("role") || "").toLowerCase();
const userId = localStorage.getItem("userId");

// 🔥 защита от null (чтобы JS не падал)
const adminBtn = document.getElementById("adminBtn");
const addBtn = document.getElementById("addExerciseBtn");

if (role === "admin") {
  if (adminBtn) adminBtn.style.display = "inline-block";
  if (addBtn) addBtn.style.display = "inline-flex";
}

// 🔥 проверка авторизации
if (!userId) {
  window.location.href = "/adminvh.html";
}

// ================= LOAD EXERCISES =================
async function loadExercises() {
  try {

    const res = await fetch("/exercises");
    const data = await res.json();

    console.log("EXERCISES:", data); // 🔥 для проверки

    const tbody = document.getElementById("exercises-table-body");

    if (!tbody) return;

    tbody.innerHTML = "";

    data.forEach(ex => {

      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${ex.name}</td>
        <td>${ex.muscle_group || "-"}</td>
        <td>
          <span class="badge ${ex.difficulty}">
            ${ex.difficulty}
          </span>
        </td>
        <td>
          ${
            role === "admin"
              ? `
                <button class="btn edit">✎</button>
                <button class="btn delete">🗑</button>
              `
              : `<span style="opacity:0.6;">Только просмотр</span>`
          }
        </td>
      `;

      // ================= DELETE =================
      if (role === "admin") {

        const delBtn = tr.querySelector(".delete");

        if (delBtn) {
          delBtn.addEventListener("click", async (e) => {
            e.stopPropagation();

            if (!confirm("Удалить упражнение?")) return;

            await fetch(`/exercises/${ex.exerciseid}`, {
              method: "DELETE"
            });

            loadExercises();
          });
        }

        // ================= EDIT =================
        const editBtn = tr.querySelector(".edit");

        if (editBtn) {
          editBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            location.href = `addEx.html?id=${ex.exerciseid}`;
          });
        }
      }

      tbody.appendChild(tr);
    });

  } catch (err) {
    console.error("ERROR LOAD EXERCISES:", err);
  }
}

// старт
loadExercises();

</script>

</body>
</html>
