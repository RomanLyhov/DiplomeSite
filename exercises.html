<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan — Упражнения</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/style.css">
</head>

<body>
<div class="top-nav">
  <div class="navbar">
      <a href="/profil.html">Профиль</a>
      <a href="/exercises.html" class="active">Упражнения</a>
      <a href="/nutrition.html">Питание</a>
      <a href="/users.html"
        id="adminBtn"
        style="display:none;">Пользователи</a>
</div>
</div>
<script>
const roleCheck = (localStorage.getItem("role") || "").toLowerCase();

if (roleCheck === "admin") {
  document.getElementById("adminBtn").style.display = "inline-block";
}
</script>
<div class="container">

  <div class="header">
    <h1>🏋️ Упражнения</h1>
    <a class="add-btn" href="addEx.html">+ Добавить</a>
  </div>

  <div class="card">

    <table>
      <thead>
        <tr>
          <th>Название</th>
          <th>Группа</th>
          <th>Сложность</th>
          <th>Действия</th>
        </tr>
      </thead>
      <tbody id="exercises-table-body"></tbody>
    </table>

  </div>

</div>

<script>
const role = (localStorage.getItem("role") || "").toLowerCase();
const userId = localStorage.getItem("userId");

if (!role || !userId) {
  window.location.href = "/adminvh.html";
}

function logout(){
  localStorage.clear();
  location.href="/adminvh.html";
}

async function loadExercises(){
  const res = await fetch("/exercises");
  const data = await res.json();

  const tbody = document.getElementById("exercises-table-body");
  tbody.innerHTML = "";

  data.forEach(ex => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
  <td>${ex.name}</td>
  <td>${ex.muscle_group || "-"}</td>
  <td>
    <span class="badge ${ex.difficulty}">
      ${ex.difficulty}
    </span>
  </td>
  <td>
    <button class="btn edit">✎</button>
    <button class="btn delete">🗑</button>
  </td>
`;

    tr.querySelector(".delete").addEventListener("click", async (e) => {
      e.stopPropagation();
      if (!confirm("Удалить упражнение?")) return;
      // ✅ исправлено: ex.exerciseid (а не ex.ExerciseID)
      await fetch(`/exercises/${ex.exerciseid}`, { method: "DELETE" });
      loadExercises();
    });

    tr.querySelector(".edit").addEventListener("click", (e) => {
      e.stopPropagation();
      // ✅ исправлено: ex.exerciseid
      location.href = `addEx.html?id=${ex.exerciseid}`;
    });

    tbody.appendChild(tr);
  });
}

loadExercises();
</script>

</body>
</html>
