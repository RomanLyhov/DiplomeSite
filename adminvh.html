<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan — Вход</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/login.css">
</head>

<body>
<div class="login-box">
<form id="loginform">
  <h2>Login</h2>
  <div class="input-group">
    <i class="fas fa-user"></i>
      <input type="text" id="login" placeholder="Email">
      <label>Username</label>
  </div>
  <div class="input-group">
    <i class="fas fa-lock"></i>
      <input type="password" id="password" placeholder="Пароль">
      <label>Password</label>
  </div>
  <div id="error-msg" style="color: #ff6b6b; font-size: 14px; text-align: center; margin-top: 10px;"></div>
  <button type="button" class="login-btn" id="submitBtn">SIGN IN</button>
</form>
</div>

<script>
// Проверка, не залогинен ли уже пользователь
const userId = localStorage.getItem("userId");
const role = (localStorage.getItem("role") || "").toLowerCase();
if (userId && role) {
  if (role === "admin") window.location.href = "/users.html";
  else window.location.href = "/profil.html";
}

// Обработчик входа
document.getElementById("submitBtn").addEventListener("click", async () => {
  const email = document.getElementById("login").value.trim();
  const password = document.getElementById("password").value.trim();
  const errorDiv = document.getElementById("error-msg");
  errorDiv.innerText = "";

  if (!email || !password) {
    errorDiv.innerText = "Введите email и пароль";
    return;
  }

  try {
    console.log("Отправка запроса на /login с:", { email, password: "***" });
    
    const res = await fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });
    
    console.log("Статус ответа:", res.status);
    const data = await res.json();
    console.log("Ответ сервера:", data);

    if (!data.success) {
      errorDiv.innerText = "Неверный email или пароль";
      return;
    }

    localStorage.setItem("userId", data.id);
    localStorage.setItem("role", data.role);
    localStorage.setItem("token", data.token);

    const userRole = (data.role || "").toLowerCase().trim();
    console.log("Роль пользователя:", userRole);
    
    if (userRole === "admin") {
      window.location.href = "/users.html";
    } else {
      window.location.href = "/profil.html";
    }
  } catch (e) {
    console.error("Ошибка:", e);
    errorDiv.innerText = "Ошибка сервера. Проверьте консоль.";
  }
});
</script>

</body>
</html>
