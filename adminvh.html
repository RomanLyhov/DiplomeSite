<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan — Вход</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/login.css">
</head>

<body>
<div class="login-box">
<form id="loginform">
  <h2>Login</h2>
  <div class="input-group">
    <i class="fas fa-user"></i>
      <input type="text" id="login" placeholder="Email">
      <label>Username</label>
  </div>
  <div class="input-group">
    <i class="fas fa-lock"></i>
      <input type="password" id="password" placeholder="Пароль">
      <label>Password</label>
  </div>
  <button type="submit" class="login-btn" id="submitBtn">Sing In</button>
</form>
</div>
<script>
  const userId = localStorage.getItem("userId");
  const role = (localStorage.getItem("role") || "").toLowerCase();
  if (userId) {
    if (role === "admin") window.location.href = "/users.html";
    else window.location.href = "/profil.html";
  }
</script>
<script>
document.getElementById("login-btn").addEventListener("click", async () => {
  const email = document.getElementById("login").value.trim();
  const password = document.getElementById("password").value.trim();
  const error = document.getElementById("error-msg");
  error.innerText = "";

  if (!email || !password) {
    error.innerText = "Введите email и пароль";
    return;
  }

  try {
    const res = await fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (!data.success) {
      error.innerText = "Неверный email или пароль";
      return;
    }

    localStorage.setItem("userId", data.id);
    localStorage.setItem("role", data.role);   // ✅ исправлено: data.role (а не data.rol)

    const role = (localStorage.getItem("role") || "").toLowerCase().trim();
    if (role === "admin") {
      window.location.href = "/users.html";
    } else {
      window.location.href = "/profil.html";
    }
  } catch (e) {
    error.innerText = "Ошибка сервера";
  }
});
</script>

</body>
</html>
