<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>FitPlan</title>
    <link rel="stylesheet" href="/style.css">

    <style>
        .is-active { background-color: #f0f8ff; }
        .badge.active { color: green; }
        .badge.blocked { color: red; }
        .search-input { margin-bottom: 10px; padding: 5px; width: 200px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    </style>
</head>

<body>

<script>

    const userId = localStorage.getItem("userId");
const role = (localStorage.getItem("role") || "").toLowerCase();

if (!userId) {
    window.location.href = "/adminvh.html";
}

if (role !== "admin") {
    window.location.href = "/profil.html";
}

</script>

<div class="admin-container">

<div class="navbar">

  <div class="nav-left">
    <div class="logo">FitPlan</div>
  </div>

  <div class="nav-center">
    <a href="/profil.html">Профиль</a>
    <a href="/exercises.html">Упражнения</a>
    <a href="/nutrition.html">Питание</a>
    <a href="/users.html" id="adminBtn" style="display:none;">
      Пользователи
    </a>
  </div>

</div>

    <main class="main-content">
        <header>
            <h1>Управление пользователями</h1>
            <input type="text" placeholder="Поиск по email..." class="search-input" id="search-input">
        </header>

        <section class="table-container">
            <p class="hint">Выберите пользователя для управления профилем</p>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>ФИО</th>
                        <th>Email</th>
                        <th>Параметры</th>
                        <th>Статус</th>
                        <th>Действия</th>
                    </tr>
                </thead>

                <tbody id="users-table-body"></tbody>
            </table>
        </section>
    </main>
</div>

<script>
async function loadUsers() {
    try {
        const response = await fetch("/users");

        if (!response.ok) {
            throw new Error("Ошибка загрузки пользователей");
        }

        let users = await response.json();

        if (!Array.isArray(users)) return;

      users.sort((a, b) => a.userid - b.userid);

        const tbody = document.getElementById("users-table-body");
        tbody.innerHTML = "";

        users.forEach(user => {
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td>${user.userid}</td>
    <td class="name">${user.name || "-"}</td>
    <td>${user.email || "-"}</td>
                <td>
                    <span class="tag">${user.weight ?? "-"}</span>
                    <span class="tag">${user.height ?? "-"}</span>
                </td>
                <td>
                    <span class="badge active">Активен</span>
                </td>
                <td>
                    <button class="btn-ui profile-btn">👤 Профиль</button>
                </td>
            `;

            tr.addEventListener("click", () => {
                document.querySelectorAll(".user-row")
                    .forEach(r => r.classList.remove("is-active"));
                tr.classList.add("is-active");
            });

            tr.querySelector(".profile-btn").addEventListener("click", (e) => {
    e.stopPropagation();

   localStorage.setItem("selectedUserId", user.userid);

    window.location.href = "/profil.html";
});

            tbody.appendChild(tr);
        });

    } catch (err) {
        console.error("Ошибка загрузки пользователей:", err);
    }
}

loadUsers();
</script>
<script>
const roleCheck = (localStorage.getItem("role") || "").toLowerCase();

if (roleCheck === "admin") {
    document.getElementById("adminBtn").style.display = "inline-block";
}
</script>
<script>
function logout() {
    localStorage.clear();
    window.location.href = "/adminvh.html";
}
</script>
</body>
</html>
