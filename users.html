<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Пользователи | FitAdmin</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        /* Минимальные стили для таблицы */
        .is-active { background-color: #f0f8ff; }
        .badge.active { color: green; }
        .badge.blocked { color: red; }
        .search-input { margin-bottom: 10px; padding: 5px; width: 200px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    </style>
</head>
<body>
<div class="admin-container">
    <nav class="sidebar">
        <div class="logo">FitAdmin</div>
        <ul>
            <li><a href="users.html" class="active">Пользователи</a></li>
            <li><a href="exercises.html">Упражнения</a></li>
            <li><a href="nutrition.html">Питание</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <header>
            <h1>Управление пользователями</h1>
            <input type="text" placeholder="Поиск по email..." class="search-input" id="search-input">
        </header>

        <section class="table-container">
            <p class="hint">Выберите пользователя для управления профилем</p>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>ФИО</th>
                        <th>Email</th>
                        <th>Параметры</th>
                        <th>Статус</th>
                        <th class="actions-column">Действия</th>
                    </tr>
                </thead>
                <tbody id="users-table-body">
                    <!-- Строки будут динамически вставляться сюда -->
                </tbody>
            </table>
        </section>
    </main>
</div>

<script>
async function loadUsers() {
    try {
        const response = await fetch("http://localhost:3000/users");
        const users = await response.json();

        const tbody = document.getElementById("users-table-body");
        tbody.innerHTML = ""; // очистим таблицу

        users.forEach(user => {
            const tr = document.createElement("tr");
            tr.classList.add("user-row");

            tr.innerHTML = `
    <td>${user.UserID}</td>
    <td class="name">${user.name}</td>
    <td>${user.email}</td>
    <td>
        <span class="tag">${user.current_weight || "-"}</span>
        <span class="tag">${user.height || "-"}</span>
    </td>
    <td>
        <span class="badge active">Активен</span>
    </td>
    <td class="actions-cell">
        <div class="action-group">
            <button class="btn-ui edit">👤 <span>Профиль</span></button>
            <button class="btn-ui delete">🚫 <span>Блок</span></button>
        </div>
    </td>
`;

            // Клик по строке
            tr.addEventListener('click', () => {
                document.querySelectorAll('.user-row').forEach(r => r.classList.remove('is-active'));
                tr.classList.add('is-active');
            });

            tbody.appendChild(tr);
        });
    } catch (err) {
        console.error("Ошибка при загрузке пользователей:", err);
    }
}

// Поиск по email
document.getElementById("search-input").addEventListener("input", function() {
    const filter = this.value.toLowerCase();
    document.querySelectorAll("#users-table-body tr").forEach(row => {
        const email = row.querySelector("td:nth-child(3)").textContent.toLowerCase();
        row.style.display = email.includes(filter) ? "" : "none";
    });
});

// Загружаем пользователей при загрузке страницы
loadUsers();
</script>
</body>
</html>
