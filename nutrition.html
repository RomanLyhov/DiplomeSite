<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan — Питание</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="top-nav">
  <div class="navbar">
      <a href="/profil.html">Профиль</a>
      <a href="/exercises.html">Упражнения</a>
      <a href="/nutrition.html" class="active">Питание</a>
      <a href="/workouts.html">Тренировки</a>
      <a href="/users.html" id="adminBtn" style="display:none;">Пользователи</a>
  </div>
</div>

<div class="header">
  <h1>Журнал питания</h1>

  <div class="filters">
    <div class="select-wrapper">
      <select id="userFilter"></select>
    </div>

    <div class="date-wrapper">
      <input type="date" id="dayFilter">
    </div>
  </div>
</div>

<!-- ✅ ВАЖНО: контейнер ОБЯЗАТЕЛЬНО -->
<div id="nutrition-cards"></div>

<script>
const role = (localStorage.getItem("role") || "").toLowerCase();
const userId = localStorage.getItem("userId");

if (!userId) {
  window.location.href = "/adminvh.html";
}

document.addEventListener("DOMContentLoaded", async () => {

  if (role === "admin") {
    document.getElementById("adminBtn").style.display = "inline-block";
  }

  await loadUsers();

  const userSelect = document.getElementById("userFilter");
  const dateInput = document.getElementById("dayFilter");

  dateInput.value = new Date().toISOString().split("T")[0];

  async function refreshMeals() {
    const uid = userSelect.value;
    const date = new Date(dateInput.value).getTime();

    await loadMeals(uid, date, date + 86400000);
  }

  userSelect.addEventListener("change", refreshMeals);
  dateInput.addEventListener("change", refreshMeals);

  refreshMeals();
});

async function loadUsers() {
  const res = await fetch("/users");
  const users = await res.json();

  const select = document.getElementById("userFilter");
  select.innerHTML = "";

  users.forEach(u => {
    select.innerHTML += `<option value="${u.userid}">${u.name}</option>`;
  });

  select.value = localStorage.getItem("userId");
}

async function loadMeals(userId, start, end) {

  const container = document.getElementById("nutrition-cards");
  container.innerHTML = "";

  try {
    const res = await fetch(`/meals?userId=${userId}&start=${start}&end=${end}`);
    const data = await res.json();

    console.log("MEALS:", data);

    if (!Array.isArray(data) || data.length === 0) {
      container.innerHTML = `<div style="opacity:0.6;text-align:center;">Нет данных</div>`;
      return;
    }

    const groups = {};

    data.forEach(m => {
      const d = new Date(Number(m.date || Date.now()));
      const key = d.toLocaleDateString("ru-RU");

      if (!groups[key]) {
        groups[key] = {
          date: key,
          items: [],
          calories: 0,
          protein: 0,
          fat: 0,
          carbs: 0
        };
      }

      groups[key].items.push(m);
      groups[key].calories += Number(m.calories || 0);
      groups[key].protein += Number(m.protein || 0);
      groups[key].fat += Number(m.fat || 0);
      groups[key].carbs += Number(m.carbs || 0);
    });

    Object.values(groups).forEach(g => {

      const card = document.createElement("div");
      card.className = "meal-card";

      card.innerHTML = `
        <div class="meal-header">
          <div>Питание</div>
          <div class="meal-time">${g.date}</div>
        </div>

        <div class="meal-body" style="display:flex; flex-direction:column; gap:6px; margin-top:10px;">

          ${g.items.map(i => `
            <div class="meal-product">
              <span>${i.productName}</span>
              <span>x${i.quantity || 1}</span>
            </div>
          `).join("")}

          <div class="meal-kbju">
            <span>${g.calories} ккал</span>
            <span>${g.protein} Б</span>
            <span>${g.fat} Ж</span>
            <span>${g.carbs} У</span>
          </div>

        </div>
      `;

      container.appendChild(card);
    });

  } catch (e) {
    console.error(e);
    container.innerHTML = "Ошибка загрузки";
  }
}
</script>
</body>
</html>
