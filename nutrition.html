<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan — Питание</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/style.css">
</head>

<body>
<div class="top-nav">
  <div class="navbar">
      <a href="/profil.html">Профиль</a>
      <a href="/exercises.html">Упражнения</a>
      <a href="/nutrition.html" class="active">Питание</a>
      <a href="/users.html"
        id="adminBtn"

        style="display:none;">Пользователи</a>
</div>
</div>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const roleCheck = (localStorage.getItem("role") || "").toLowerCase();

  if (roleCheck === "admin") {
    const btn = document.getElementById("adminBtn");
    if (btn) btn.style.display = "inline-block";
  }
});

</script>
<div class="container">

  <div class="header">
    <h1>🥗 Журнал питания</h1>

    <select id="userFilter"></select>
  </div>

  <div class="card">

    <table>
      <thead>
        <tr>
          <th>Время</th>
          <th>Продукт</th>
          <th>Ккал</th>
        </tr>
      </thead>

      <tbody id="nutrition-table-body"></tbody>
    </table>

  </div>

</div>

<script>
const role = (localStorage.getItem("role") || "").toLowerCase();
const userId = localStorage.getItem("userId");

if (!role || !userId) {
  window.location.href = "/adminvh.html";
}

function logout(){
  localStorage.clear();
  location.href="/adminvh.html";
}

// USERS
async function loadUsers(){
  const res = await fetch("/users");
  const users = await res.json();

  const select = document.getElementById("userFilter");
  select.innerHTML = "";

  users.forEach(u => {
    // ✅ исправлено: u.userid (а не u.UserID)
    select.innerHTML += `<option value="${u.userid}">${u.name}</option>`;
  });
}

loadUsers();
</script>

</body>
</html>
