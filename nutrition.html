<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan — Питание</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#0b0f1a;
  color:white;
}

.top-nav{
  padding:15px;
  background:#111827;
}

.navbar a{
  margin-right:15px;
  color:white;
  text-decoration:none;
  opacity:0.7;
}

.navbar a.active{
  opacity:1;
  font-weight:600;
}

.header{
  padding:20px;
}

.filters{
  display:flex;
  gap:10px;
  margin-top:10px;
}

#nutrition-cards{
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

/* ===== CARD ===== */
.meal-card{
  background:#151c2c;
  border-radius:16px;
  padding:15px;
  cursor:pointer;
  transition:0.2s;
  border:1px solid rgba(255,255,255,0.05);
}

.meal-card:hover{
  transform:scale(1.01);
}

.meal-header{
  display:flex;
  justify-content:space-between;
  font-weight:600;
  margin-bottom:10px;
}

.meal-time{
  font-size:12px;
  opacity:0.7;
}

.meal-products{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-bottom:10px;
}

.meal-product{
  display:flex;
  justify-content:space-between;
  font-size:14px;
  opacity:0.9;
}

.meal-kbju{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="top-nav">
  <div class="navbar">
      <a href="/profil.html">Профиль</a>
      <a href="/exercises.html">Упражнения</a>
      <a href="/nutrition.html" class="active">Питание</a>
      <a href="/workouts.html">Тренировки</a>
      <a href="/users.html" id="adminBtn" style="display:none;">Пользователи</a>
  </div>
</div>

<div class="header">
  <h1>Журнал питания</h1>

  <div class="filters">
    <select id="userFilter"></select>
    <input type="date" id="dayFilter">
  </div>
</div>

<div id="nutrition-cards"></div>

<script>
let role = "";
let userId = "";

/* ===== INIT ===== */
document.addEventListener("DOMContentLoaded", async () => {

  role = (localStorage.getItem("role") || "").toLowerCase();
  userId = localStorage.getItem("userId");

  if (!userId) {
    window.location.href = "/adminvh.html";
    return;
  }

  if (role === "admin") {
    document.getElementById("adminBtn").style.display = "inline-block";
  }

  await loadUsers();

  const userSelect = document.getElementById("userFilter");
  const dateInput = document.getElementById("dayFilter");

  dateInput.value = new Date().toISOString().split("T")[0];

  userSelect.value = userId;

  async function refresh() {
    const uid = userSelect.value;
    const date = new Date(dateInput.value).getTime();

    await loadMeals(uid, date, date + 86400000);
  }

  userSelect.onchange = refresh;
  dateInput.onchange = refresh;

  refresh();
});

/* ===== USERS ===== */
async function loadUsers(){
  const res = await fetch("/users");
  const users = await res.json();

  const select = document.getElementById("userFilter");
  select.innerHTML = "";

  users.forEach(u => {
    select.innerHTML += `<option value="${u.userid}">${u.name}</option>`;
  });
}

/* ===== MEALS ===== */
async function loadMeals(userId, start, end){
  const container = document.getElementById("nutrition-cards");
  container.innerHTML = "";

  const res = await fetch(`/meals?userId=${userId}&start=${start}&end=${end}`);
  const data = await res.json();

  if (!data.length){
    container.innerHTML = "<p style='opacity:0.6'>Нет данных</p>";
    return;
  }

  const groups = {};

  data.forEach(m => {
    const d = new Date(Number(m.date));
    const key = d.toLocaleDateString("ru-RU");

    if (!groups[key]){
      groups[key] = {
        date: key,
        items: [],
        calories: 0,
        protein: 0,
        fat: 0,
        carbs: 0
      };
    }

    groups[key].items.push(m);
    groups[key].calories += Number(m.calories || 0);
    groups[key].protein += Number(m.protein || 0);
    groups[key].fat += Number(m.fat || 0);
    groups[key].carbs += Number(m.carbs || 0);
  });

  Object.values(groups).forEach(g => {

    const card = document.createElement("div");
    card.className = "meal-card";

    card.innerHTML = `
      <div class="meal-header">
        <div>Питание</div>
        <div class="meal-time">${g.date}</div>
      </div>

      <div class="meal-products">
        ${g.items.map(i => `
          <div class="meal-product">
            <span>${i.productName}</span>
            <span>x${i.quantity}</span>
          </div>
        `).join("")}
      </div>

      <div class="meal-kbju">
        <span>${g.calories} ккал</span>
        <span>${g.protein} Б</span>
        <span>${g.fat} Ж</span>
        <span>${g.carbs} У</span>
      </div>
    `;

    container.appendChild(card);
  });
}
</script>

</body>
</html>
