<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan — Питание</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="top-nav">
  <div class="navbar">
      <a href="/profil.html">Профиль</a>
      <a href="/exercises.html">Упражнения</a>
      <a href="/nutrition.html" class="active">Питание</a>
      <a href="/workouts.html">Тренировки</a>
      <a href="/users.html" id="adminBtn" style="display:none;">Пользователи</a>
  </div>
</div>

<div class="container">

  <div class="header">
    <h1>Журнал питания</h1>
    <select id="userFilter"></select>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Дата и время</th>
          <th>Приём пищи</th>
          <th>Продукт</th>
          <th>Кол-во</th>
          <th>Ккал</th>
        </tr>
      </thead>

      <tbody id="nutrition-table-body"></tbody>
    </table>
  </div>

</div>

<script>
const role = (localStorage.getItem("role") || "").toLowerCase();
const userId = localStorage.getItem("userId");

if (!role || !userId) {
  window.location.href = "/adminvh.html";
}

// показать админ кнопку
document.addEventListener("DOMContentLoaded", () => {
  if (role === "admin") {
    const btn = document.getElementById("adminBtn");
    if (btn) btn.style.display = "inline-block";
  }
});

// ================= USERS =================
async function loadUsers(){
  const res = await fetch("/users");
  const users = await res.json();

  const select = document.getElementById("userFilter");
  select.innerHTML = "";

  users.forEach(u => {
    select.innerHTML += `<option value="${u.userid}">${u.name}</option>`;
  });

  select.value = userId;
}

// ================= MEALS =================
async function loadMeals(userId){
  const res = await fetch(`/meals?userId=${userId}`);
  const data = await res.json();

  const tbody = document.getElementById("nutrition-table-body");
  tbody.innerHTML = "";

  if (!data.length) {
    tbody.innerHTML = `
      <tr>
        <td colspan="5" style="text-align:center; opacity:0.6;">
          Нет данных
        </td>
      </tr>
    `;
    return;
  }

  data.forEach(m => {

    const d = new Date(Number(m.date));

    const formattedDate = d.toLocaleDateString("ru-RU", {
      day: "2-digit",
      month: "2-digit",
      year: "numeric"
    });

    const formattedTime = d.toLocaleTimeString("ru-RU", {
      hour: "2-digit",
      minute: "2-digit"
    });

    const fullDateTime = `${formattedDate} ${formattedTime}`;

    tbody.innerHTML += `
      <tr>
        <td>${fullDateTime}</td>
        <td>${m.mealType || "-"}</td>
        <td>${m.productName || "-"}</td>
        <td>${m.quantity || "-"}</td>
        <td>${m.calories || 0}</td>
      </tr>
    `;
  });
}

// ================= INIT =================
document.addEventListener("DOMContentLoaded", async () => {
  await loadUsers();
  await loadMeals(userId);

  document.getElementById("userFilter").addEventListener("change", (e) => {
    loadMeals(e.target.value);
  });
});
</script>

</body>
</html>
