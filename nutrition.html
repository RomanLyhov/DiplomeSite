<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan — Питание</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="top-nav">
  <div class="navbar">
      <a href="/profil.html">Профиль</a>
      <a href="/exercises.html">Упражнения</a>
      <a href="/nutrition.html" class="active">Питание</a>
      <a href="/workouts.html">Тренировки</a>
      <a href="/users.html" id="adminBtn" style="display:none;">Пользователи</a>
  </div>
</div>

<div class="header">
  <h1>Журнал питания</h1>

  <div class="filters">
    <div class="select-wrapper">
      <select id="userFilter"></select>
    </div>

    <div class="date-wrapper">
      <input type="date" id="dayFilter">
    </div>
  </div>
</div>

<!-- ✅ ВАЖНО: контейнер ОБЯЗАТЕЛЬНО -->
<div id="nutrition-cards"></div>

<script>
const role = (localStorage.getItem("role") || "").toLowerCase();
const userId = localStorage.getItem("userId");

if (!role || !userId) {
  window.location.href = "/adminvh.html";
}

// показать админ кнопку
document.addEventListener("DOMContentLoaded", () => {
  if (role === "admin") {
    const btn = document.getElementById("adminBtn");
    if (btn) btn.style.display = "inline-block";
  }
});

// ================= USERS =================
async function loadUsers() {
  const res = await fetch("/users");
  const users = await res.json();

  const select = document.getElementById("userFilter");
  select.innerHTML = "";

  users.forEach(u => {
    select.innerHTML += `<option value="${u.userid}">${u.name}</option>`;
  });

  select.value = String(userId);
}

// ================= MEALS =================
async function loadMeals(userId, start, end) {
  const container = document.getElementById("nutrition-cards");
  if (!container) return;

  let url = `/meals?userId=${userId}`;

  if (start && end) {
    url += `&start=${start}&end=${end}`;
  }

  const res = await fetch(url);
  const data = await res.json();

  container.innerHTML = "";

  if (!data.length) {
    container.innerHTML = `<div style="opacity:0.6;text-align:center;">Нет данных</div>`;
    return;
  }

  // ===== grouping =====
  const groups = {};

  data.forEach(m => {
    const d = new Date(Number(m.date));
    const dateKey = d.toLocaleDateString("ru-RU");
    const key = `${dateKey}_${m.mealType || "Другое"}`;

    if (!groups[key]) {
      groups[key] = {
        mealType: m.mealType || "Другое",
        date: dateKey,
        time: d,
        items: [],
        calories: 0,
        protein: 0,
        fat: 0,
        carbs: 0
      };
    }

    groups[key].items.push(m);
    groups[key].calories += Number(m.calories || 0);
    groups[key].protein += Number(m.protein || 0);
    groups[key].fat += Number(m.fat || 0);
    groups[key].carbs += Number(m.carbs || 0);
  });

  // ===== render =====
  Object.values(groups).forEach(g => {

    const card = document.createElement("div");
    card.className = "meal-card";

    const time = g.time.toLocaleTimeString("ru-RU", {
      hour: "2-digit",
      minute: "2-digit"
    });

    card.innerHTML = `
      <div class="meal-header">
        <div>${g.mealType}</div>
        <div class="meal-time">${g.date} ${time}</div>
      </div>

      <div class="meal-body">

        <div class="meal-products">
          ${g.items.map(i => `
            <div class="meal-product">
              <span>${i.productName}</span>
              <span>x${i.quantity || 1}</span>
            </div>
          `).join("")}
        </div>

        <div class="meal-kbju">
          <span>${g.calories} ккал</span>
          <span>${g.protein} Б</span>
          <span>${g.fat} Ж</span>
          <span>${g.carbs} У</span>
        </div>

      </div>
    `;

    card.addEventListener("click", () => {
      card.classList.toggle("open");
    });

    container.appendChild(card);
  });
}

// ================= INIT (ОДИН РАЗ!) =================
document.addEventListener("DOMContentLoaded", async () => {
  await loadUsers();

  const userSelect = document.getElementById("userFilter");
  const dateInput = document.getElementById("dayFilter");

  const today = new Date();
  dateInput.value = today.toISOString().split("T")[0];

  async function refreshMeals() {
    const uid = userSelect.value;
    const date = dateInput.value;

    const start = new Date(date).getTime();
    const end = start + 24 * 60 * 60 * 1000;

    await loadMeals(uid, start, end);
  }

  userSelect.addEventListener("change", refreshMeals);
  dateInput.addEventListener("change", refreshMeals);

  await refreshMeals();
});
</script>

</body>
</html>
