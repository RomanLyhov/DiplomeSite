<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan — Питание</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="top-nav">
  <div class="navbar">
      <a href="/profil.html">Профиль</a>
      <a href="/exercises.html">Упражнения</a>
      <a href="/nutrition.html" class="active">Питание</a>
      <a href="/workouts.html">Тренировки</a>
      <a href="/users.html" id="adminBtn" style="display:none;">Пользователи</a>
  </div>
</div>

<div class="container">

  <div class="header">
    <h1>Журнал питания</h1>
    <select id="userFilter"></select>
  </div>

  <div class="card">
  <div id="nutrition-cards" class="nutrition-grid"></div>
</div>

</div>

<script>
const role = (localStorage.getItem("role") || "").toLowerCase();
const userId = localStorage.getItem("userId");

if (!role || !userId) {
  window.location.href = "/adminvh.html";
}

// показать админ кнопку
document.addEventListener("DOMContentLoaded", () => {
  if (role === "admin") {
    const btn = document.getElementById("adminBtn");
    if (btn) btn.style.display = "inline-block";
  }
});

// ================= USERS =================
async function loadUsers(){
  const res = await fetch("/users");
  const users = await res.json();

  const select = document.getElementById("userFilter");
  select.innerHTML = "";

  users.forEach(u => {
    select.innerHTML += `<option value="${u.userid}">${u.name}</option>`;
  });

  select.value = userId;
}

// ================= MEALS =================
async function loadMeals(userId){
  const res = await fetch(`/meals?userId=${userId}`);
  const data = await res.json();

  const container = document.getElementById("nutrition-cards");
  container.innerHTML = "";

  if (!data.length) {
    container.innerHTML = `
      <div style="opacity:0.6; text-align:center;">
        Нет данных
      </div>
    `;
    return;
  }

  data.forEach(m => {

    const d = new Date(Number(m.date));

    const time = d.toLocaleTimeString("ru-RU", {
      hour: "2-digit",
      minute: "2-digit"
    });

    const date = d.toLocaleDateString("ru-RU");

    const card = document.createElement("div");
    card.className = "meal-card";

    card.innerHTML = `
      <div class="meal-header">
        <div>${m.mealType || "Приём пищи"}</div>
        <div class="meal-time">${date} ${time}</div>
      </div>

      <div class="meal-body">
        <div class="meal-product">
          <span>${m.productName}</span>
          <span>x${m.quantity || 1}</span>
        </div>

        <div class="meal-kbju">
          <span>🔥 ${m.calories || 0} ккал</span>
          <span>🥩 ${m.protein || 0} Б</span>
          <span>🧈 ${m.fat || 0} Ж</span>
          <span>🍚 ${m.carbs || 0} У</span>
        </div>
      </div>
    `;

    card.addEventListener("click", () => {
      card.classList.toggle("open");
    });

    container.appendChild(card);
  });
}

// ================= INIT =================
document.addEventListener("DOMContentLoaded", async () => {
  await loadUsers();
  await loadMeals(userId);

  document.getElementById("userFilter").addEventListener("change", (e) => {
    loadMeals(e.target.value);
  });
});
</script>

</body>
</html>
