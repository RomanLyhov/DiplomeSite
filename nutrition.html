<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitPlan — Питание</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="top-nav">
  <div class="navbar">
      <a href="/profil.html">Профиль</a>
      <a href="/exercises.html">Упражнения</a>
      <a href="/nutrition.html" class="active">Питание</a>
      <a href="/workouts.html">Тренировки</a>
      <a href="/users.html" id="adminBtn" style="display:none;">Пользователи</a>
  </div>
</div>

<div class="container">

  <div class="header">
    <h1>Журнал питания</h1>
    <select id="userFilter"></select>
    <input type="date" id="dayFilter">
  </div>

  <div class="card">
  <div id="nutrition-cards" class="nutrition-grid"></div>
</div>

</div>

<script>
const role = (localStorage.getItem("role") || "").toLowerCase();
const userId = localStorage.getItem("userId");

if (!role || !userId) {
  window.location.href = "/adminvh.html";
}

// показать админ кнопку
document.addEventListener("DOMContentLoaded", () => {
  if (role === "admin") {
    const btn = document.getElementById("adminBtn");
    if (btn) btn.style.display = "inline-block";
  }
});

// ================= USERS =================
async function loadUsers(){
  const res = await fetch("/users");
  const users = await res.json();

  const select = document.getElementById("userFilter");
  select.innerHTML = "";

  users.forEach(u => {
    select.innerHTML += `<option value="${u.userid}">${u.name}</option>`;
  });

  select.value = userId;
}

// ================= MEALS =================
async function loadMeals(userId, startDate = null, endDate = null){
  let url = `/meals?userId=${userId}`;

  if (startDate && endDate) {
    url += `&start=${startDate}&end=${endDate}`;
  }

  const res = await fetch(url);
  const data = await res.json();

  const container = document.getElementById("nutrition-cards");
  container.innerHTML = "";

  if (!data.length) {
    container.innerHTML = `<div style="opacity:0.6;text-align:center;">Нет данных</div>`;
    return;
  }

  // ================= GROUPING =================
  const groups = {};

  data.forEach(m => {
    const d = new Date(Number(m.date));

    // ключ = дата + тип приема пищи
    const dateKey = d.toLocaleDateString("ru-RU");
    const key = `${dateKey}_${m.mealType || "Другое"}`;

    if (!groups[key]) {
      groups[key] = {
        mealType: m.mealType || "Другое",
        date: dateKey,
        time: d,
        items: [],
        calories: 0,
        protein: 0,
        fat: 0,
        carbs: 0
      };
    }

    groups[key].items.push(m);

    groups[key].calories += Number(m.calories || 0);
    groups[key].protein += Number(m.protein || 0);
    groups[key].fat += Number(m.fat || 0);
    groups[key].carbs += Number(m.carbs || 0);
  });

  // ================= RENDER =================
  Object.values(groups).forEach(g => {

    const card = document.createElement("div");
    card.className = "meal-card";

    const time = g.time.toLocaleTimeString("ru-RU", {
      hour: "2-digit",
      minute: "2-digit"
    });

    card.innerHTML = `
      <div class="meal-header">
        <div>${g.mealType}</div>
        <div class="meal-time">${g.date} ${time}</div>
      </div>

      <div class="meal-body">

        <div class="meal-products">
          ${g.items.map(i => `
            <div class="meal-product">
              <span>${i.productName}</span>
              <span>x${i.quantity || 1}</span>
            </div>
          `).join("")}
        </div>

        <div class="meal-kbju">
          <span> ${g.calories} ккал</span>
          <span> ${g.protein} Б</span>
          <span> ${g.fat} Ж</span>
          <span> ${g.carbs} У</span>
        </div>

      </div>
    `;

    card.addEventListener("click", () => {
      card.classList.toggle("open");
    });

    container.appendChild(card);
  });
}

document.addEventListener("DOMContentLoaded", async () => {
  await loadUsers();

  const today = new Date().toISOString().split("T")[0];
  document.getElementById("dayFilter").value = today;

  await loadMeals(userId);

  document.getElementById("userFilter").addEventListener("change", (e) => {
    loadMeals(e.target.value);
  });

  document.getElementById("dayFilter").addEventListener("change", (e) => {
    const date = e.target.value;

    const start = new Date(date).getTime();
    const end = start + 24 * 60 * 60 * 1000;

    loadMeals(
      document.getElementById("userFilter").value,
      start,
      end
    );
  });
});
// ================= INIT =================
document.addEventListener("DOMContentLoaded", async () => {
  await loadUsers();
  await loadMeals(userId);

  document.getElementById("userFilter").addEventListener("change", (e) => {
    loadMeals(e.target.value);
  });
});
</script>

</body>
</html>
